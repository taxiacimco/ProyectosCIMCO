<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/logo-taxiacimco.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>TAXIA CIMCO - Movilidad Inteligente</title>

    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
      crossorigin="" 
    />

    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" 
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
      /* Reset global para evitar scrolls fantasma */
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #020617; /* Slate-950 */
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }

      /* Ajustes para el mapa Leaflet */
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 1;
        background: #020617 !important;
      }
      
      /* Ocultar instrucciones de ruteo en móviles para ganar espacio */
      .leaflet-routing-container {
        display: none !important;
      }

      /* Estilo de la barra de scroll (modo dark) */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #020617;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
