<script type="module">
    // Corrección de sintaxis de importación
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { app } from "../js/firebase-config-pasajero.js"; // Asegúrate de que la ruta sea correcta

    const auth = getAuth(app);
    const db = getFirestore(app);

    const viajesList = document.getElementById("viajesList");
    const userEmailEl = document.getElementById("userEmail");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        userEmailEl.textContent = user.email;
        // Cambiado "viajes" a "rides" para que coincida con tu backend actual si es necesario
        const q = query(collection(db, "rides"), where("pasajeroId", "==", user.uid));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          viajesList.innerHTML = "<p class='text-center text-gray-400'>No tienes viajes registrados 🚖</p>";
          return;
        }

        viajesList.innerHTML = ""; // Limpiar antes de llenar
        snapshot.forEach((docu) => {
          const v = docu.data();
          const card = document.createElement("div");
          card.className = "bg-slate-800 p-4 rounded-lg shadow mb-3 border border-slate-700";
          card.innerHTML = `
            <p><b>📍 Origen:</b> ${v.origen}</p>
            <p><b>🏁 Destino:</b> ${v.destino}</p>
            <p><b>📅 Fecha:</b> ${v.fecha || "Reciente"}</p>
            <p><b>🔄 Estado:</b> <span class="text-cyan-400">${v.status || "Pendiente"}</span></p>
          `;
          viajesList.appendChild(card);
        });
      } else {
        window.location.href = "../login.html";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "../login.html";
    });
</script>
