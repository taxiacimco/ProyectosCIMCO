<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Pasajero - TAXIA CIMCO</title>
    <link rel="icon" href="../icons/pasajero-192.png" />
    <link rel="manifest" href="/manifest-pasajero.webmanifest" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; visibility: hidden; }
        #map { height: 280px; border-radius: 1.5rem; border: 2px solid #1e293b; }
        .neon-glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
        .view-hidden { display: none !important; }
        input, select { transition: all 0.2s; }
        input:focus { border-color: #06b6d4 !important; box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
    </style>

    <script type="module">
        import { checkAuthAndRedirect } from '../js/auth-guard.js';
        checkAuthAndRedirect('pasajero').then(isAllowed => {
            if (isAllowed) { document.body.style.visibility = 'visible'; }
        });
    </script>
</head>

<body class="min-h-screen pb-10">
    <header class="p-4 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center border-b border-slate-800 shadow-2xl">
        <h1 class="text-xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">TAXIA CIMCO</h1>
        <div class="flex items-center gap-3">
            <div class="flex flex-col items-end">
                <span id="userInfo" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-none">Verificando...</span>
                <span class="text-[9px] text-green-500 font-bold animate-pulse uppercase">Online</span>
            </div>
            <button id="logoutBtn" class="bg-red-950/30 text-red-500 border border-red-900/50 px-3 py-1.5 rounded-xl text-[10px] font-black hover:bg-red-600 hover:text-white transition-all">SALIR</button>
        </div>
    </header>

    <main class="p-4 space-y-4 max-w-lg mx-auto">
        <section class="bg-slate-900 p-2 rounded-[2rem] border border-slate-800 shadow-inner">
            <div id="map" class="neon-glow"></div>
        </section>

        <section class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl space-y-5">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-cyan-500 rounded-full"></div>
                <h2 class="text-[11px] font-black text-cyan-500 uppercase tracking-[0.2em]">Solicitar Servicio</h2>
            </div>
            
            <div class="space-y-4">
                <div class="relative">
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-1 ml-2 block tracking-widest">¿A dónde vas?</label>
                    <input type="text" id="destinationAddress" placeholder="Ej: Terminal de Transportes" 
                           class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-white outline-none placeholder:text-slate-700">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-gray-500 font-black uppercase mb-1 ml-2 block tracking-widest">Tipo</label>
                        <select id="serviceType" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm font-bold text-white outline-none">
                            <option value="mototaxi">🛵 Mototaxi</option>
                            <option value="motoparrillero">🏍️ Parrillero</option>
                            <option value="motocarga">🚚 Motocarga</option>
                            <option value="intermunicipal">🚌 Intermunicipal</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 font-black uppercase mb-1 ml-2 block tracking-widest">Oferta (COP)</label>
                        <input type="number" id="price" value="5000" step="500" 
                               class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl font-black text-green-400 outline-none">
                    </div>
                </div>

                <div id="cooperativeSection" class="view-hidden animate-in fade-in slide-in-from-top-2 duration-300">
                    <label class="text-[10px] text-cyan-500 font-black uppercase mb-1 ml-2 block tracking-widest">Seleccionar Empresa / Coop.</label>
                    <select id="cooperativeSelect" class="w-full bg-slate-900 border-2 border-cyan-900/50 p-4 rounded-2xl text-sm font-bold text-white outline-none shadow-lg">
                        <option value="">-- Elija Cooperativa --</option>
                        </select>
                </div>

                <button id="solicitarViaje" class="w-full bg-cyan-500 py-4 rounded-2xl font-black text-slate-950 uppercase tracking-widest shadow-[0_10px_20px_rgba(6,182,212,0.3)] active:scale-95 transition-all">
                    PEDIR SERVICIO AHORA
                </button>
            </div>
            
            <div id="statusContainer" class="hidden text-center p-3 bg-slate-950 rounded-xl border border-slate-800">
                <p id="estado" class="text-xs font-bold text-yellow-400 tracking-wide"></p>
                <div class="mt-2 flex justify-center gap-1">
                    <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                    <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="../js/pasajero-app.js"></script>
    <audio id="gpsSound" src="../js/sounds/notify.mp3" preload="auto"></audio>
</body>
</html>
