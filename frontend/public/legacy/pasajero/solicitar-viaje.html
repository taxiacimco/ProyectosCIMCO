<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pasajero - Solicitar Viaje | TAXIA CIMCO</title>
    <!-- Incluir Tailwind CSS (asumiendo que output.css lo contiene) -->
    <link href="../css/output.css" rel="stylesheet" />
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>


    <script>
        <!-- Define el entorno de la aplicación. 'dev' (Desarrollo) es el valor por defecto. -->
        <!-- CÁMBIALO MANUALMENTE A 'prod' solo antes de desplegar en producción. -->
        const APP_ENV = 'dev'; 
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
    <div id="app-container" class="w-full max-w-md bg-white rounded-xl shadow-2xl p-6 md:p-8 transform transition duration-500 ease-in-out hover:scale-[1.01]">
        
        <div id="auth-status" class="mb-4 text-center text-sm font-medium text-gray-500">
            <span class="inline-flex items-center">
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-violet-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Cargando autenticación...
            </span>
        </div>

        <h1 class="text-3xl font-extrabold text-violet-700 mb-6 text-center">
            Solicitar Servicio TAXIA
        </h1>

        <div id="form-container">
            <div class="mb-4">
                <label for="origen" class="block text-left text-sm font-medium text-gray-700 mb-1">
                    📍 Origen (Ubicación actual)
                </label>
                <input type="text" id="origen" value="Obteniendo coordenadas..." disabled
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-100 focus:ring-violet-500 focus:border-violet-500 transition duration-150 ease-in-out"
                       placeholder="Cargando ubicación GPS..." />
            </div>

            <div class="mb-6">
                <label for="destino" class="block text-left text-sm font-medium text-gray-700 mb-1">
                    🏁 Destino (Dirección)
                </label>
                <input type="text" id="destino"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-violet-500 focus:border-violet-500 transition duration-150 ease-in-out"
                       placeholder="Ej: Calle 10 # 5-20, Centro" />
            </div>
            
            <div class="mb-6">
                <label for="tipoPago" class="block text-left text-sm font-medium text-gray-700 mb-1">
                    💳 Tipo de Pago
                </label>
                <select id="tipoPago"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm bg-white focus:ring-violet-500 focus:border-violet-500 transition duration-150 ease-in-out">
                    <option value="efectivo">Efectivo</option>
                    <option value="credito">Crédito Cimco (Corporativo)</option>
                    <option value="nequi">Nequi / Bancolombia</option>
                </select>
            </div>

            <button id="solicitarViaje"
                    class="w-full flex items-center justify-center px-6 py-3 border border-transparent text-base font-semibold rounded-xl text-white bg-gradient-to-r from-violet-600 to-indigo-600 shadow-lg shadow-violet-500/50 hover:from-violet-700 hover:to-indigo-700 transition duration-300 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                <svg id="loader-icon" class="hidden animate-spin h-5 w-5 mr-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="button-text">Activar GPS para solicitar</span>
            </button>
        </div>

        <p id="estado" class="mt-4 text-sm font-medium transition duration-300 text-gray-600">
            Esperando ubicación y datos...
        </p>

    </div>

    <!-- Scripts -->
    
    <script type="module" src="./js/pasajero-solicitud.js"></script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
