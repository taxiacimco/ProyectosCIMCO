<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Pasajero - TAXIA CIMCO</title>
    <link rel="icon" href="../icons/pasajero-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>

    <!-- APP_ENV (Estándar CIMCO) -->
    <script>
        window.APP_ENV = "prod";
    </script>

    <!-- Carga Única de Firebase Loader (Maneja __firebase_config) -->
    <script src="/js/firebase/firebase-loader.js"></script>
    
    <!-- Script de Lógica de Registro (Maneja Auth y Firestore) -->
    <script type="module" src="./js/pasajero-registro.js"></script>

    <script>
        <!-- Define el entorno de la aplicación. 'dev' (Desarrollo) es el valor por defecto. -->
        <!-- CÁMBIALO MANUALMENTE A 'prod' solo antes de desplegar en producción. -->
        const APP_ENV = 'dev'; 
    </script>
</head>

<body class="flex items-center justify-center min-h-screen bg-slate-900 text-gray-200 p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-cyan-700/50">
        <div class="text-center mb-8">
            <!-- Icono Pasajero: Usando placeholder temporal -->
            <img src="../icons/pasajero-192.png" onerror="this.onerror=null; this.src='https://placehold.co/80x80/0f172a/06b6d4?text=PAS'" class="mx-auto w-20 mb-3 rounded-full border-2 border-cyan-500 p-1" alt="Icono Pasajero"/>
            <h1 class="text-3xl font-bold text-cyan-400">Regístrate como Pasajero</h1>
            <p class="text-gray-400 text-sm mt-1">Crea tu cuenta para comenzar a solicitar viajes.</p>
        </div>

        <form id="registroForm" class="space-y-4">
            <div>
                <label for="nombre" class="block text-sm font-medium text-cyan-200 mb-1">Nombre completo</label>
                <input id="nombre" type="text" placeholder="Tu nombre"
                    class="w-full p-3 bg-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-400 border border-slate-600 transition duration-200 text-white" required />
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-cyan-200 mb-1">Correo electrónico</label>
                <input id="email" type="email" placeholder="correo@ejemplo.com"
                    class="w-full p-3 bg-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-400 border border-slate-600 transition duration-200 text-white" required />
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-cyan-200 mb-1">Contraseña</label>
                <input id="password" type="password" placeholder="Contraseña segura (min. 6 caracteres)"
                    class="w-full p-3 bg-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-400 border border-slate-600 transition duration-200 text-white" required />
            </div>

            <button type="submit" id="registerButton"
                class="w-full bg-gradient-to-r from-cyan-600 to-green-500 py-3 rounded-lg font-bold text-lg text-slate-900 hover:scale-[1.02] transition shadow-lg shadow-cyan-500/30">
                Registrarme
            </button>
        </form>

        <p id="status" class="text-center text-sm mt-4 min-h-[1.25rem]"></p>
        
        <div class="text-center text-sm text-gray-500 pt-4 border-t border-slate-700 mt-6">
            ¿Ya tienes cuenta? 
            <a href="login-pasajero.html" class="font-medium text-cyan-400 hover:text-cyan-300 transition duration-150">
                Iniciar Sesión
            </a>
        </div>
    </div>
</body>
</html>
