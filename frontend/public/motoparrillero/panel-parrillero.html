<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel Motoparrillero - TAXIA CIMCO</title>
  <link rel="manifest" href="/motoparrillero/manifest-motoparrillero.webmanifest">
  
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
    #map { height: 50vh; border-radius: 15px; border: 2px solid #6b21a8; }
    .view-hidden { display: none !important; }
    .view-active { display: block; }
    .glow-purple { box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
  </style>
</head>

<body class="min-h-screen">
  <header class="bg-slate-900 border-b border-purple-900/50 p-4 flex justify-between items-center shadow-2xl">
    <h1 class="text-xl font-black text-purple-400 italic">MOTOPARRILLERO</h1>
    <div class="flex items-center gap-3">
      <span id="userEmail" class="text-[10px] text-slate-400 uppercase font-bold tracking-widest"></span>
      <button id="logoutBtn" class="bg-red-900/20 text-red-500 border border-red-900/30 px-3 py-1 rounded-lg text-xs font-bold">SALIR</button>
    </div>
  </header>

  <main class="p-4 space-y-4">
    <div class="flex gap-2">
      <button id="viewMapBtn" class="flex-1 py-3 rounded-2xl bg-purple-600 text-white font-black text-xs uppercase glow-purple">Mapa & Viajes</button>
      <button id="viewNequiBtn" class="flex-1 py-3 rounded-2xl bg-slate-800 text-purple-400 border border-purple-900/50 font-black text-xs uppercase">Recarga Nequi</button>
    </div>

    <section id="mapView" class="view-active space-y-4">
      <button id="toggleTracking" class="w-full py-2 rounded-xl bg-slate-800 border border-purple-500/30 text-purple-300 text-[10px] font-bold uppercase tracking-widest">
        📡 Activar Seguimiento GPS
      </button>

      <div id="map" class="w-full glow-purple"></div>

      <section class="bg-slate-900 p-5 rounded-3xl border border-purple-500/20 shadow-inner">
        <h2 class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-3">Viaje Asignado</h2>
        <div id="assignedInfo" class="text-sm text-slate-300 space-y-1">Buscando pasajeros...</div>
        
        <div class="mt-6 flex flex-col gap-2">
          <button id="acceptBtn" class="hidden w-full bg-purple-500 text-slate-950 py-4 rounded-2xl font-black text-lg shadow-lg">ACEPTAR SERVICIO</button>
          <button id="startBtn" class="hidden w-full bg-cyan-500 text-slate-950 py-4 rounded-2xl font-black text-lg shadow-lg">INICIAR RECORRIDO</button>
          <button id="finishBtn" class="hidden w-full bg-green-500 text-slate-950 py-4 rounded-2xl font-black text-lg shadow-lg">FINALIZAR VIAJE</button>
        </div>
      </section>
    </section>

    <section id="nequiView" class="view-hidden flex justify-center items-center pt-8">
      </section>
  </main>

  <audio id="alertSound" src="/js/sounds/notify.mp3" preload="auto"></audio>

  <script type="module" src="./js/parrillero-panel.js"></script>
  <script type="module" src="./js/parrillero-tracking.js"></script>
  <script type="module" src="./js/parrillero-nequi-app.js"></script>

  <script>
    const mapView = document.getElementById('mapView');
    const nequiView = document.getElementById('nequiView');
    
    document.getElementById('viewMapBtn').addEventListener('click', () => {
      mapView.classList.remove('view-hidden');
      nequiView.classList.add('view-hidden');
    });

    document.getElementById('viewNequiBtn').addEventListener('click', () => {
      mapView.classList.add('view-hidden');
      nequiView.classList.remove('view-hidden');
      window.dispatchEvent(new CustomEvent('nequiViewActivated'));
    });
  </script>
</body>
</html>
