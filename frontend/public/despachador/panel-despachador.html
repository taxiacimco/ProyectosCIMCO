<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Despacho - TAXIA CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <style>
        /* Seguridad visual preventiva */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; visibility: hidden; }
        .text-neon-cyan { color: #00F0FF; }
        .btn-neon-gradient {
            background-image: linear-gradient(to right, #B300F2, #00F0FF);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px -5px #B300F2;
        }
        .btn-neon-gradient:hover { transform: translateY(-2px); box-shadow: 0 6px 20px -5px #00F0FF; }
        .tab-active { border-bottom: 3px solid #00F0FF; color: #00F0FF; font-weight: 700; }
        .viajes-container { max-height: 500px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1e293b transparent; }
        #map { height: 350px; border-radius: 12px; margin-bottom: 1rem; border: 1px solid #1e293b; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* Animación para nuevas solicitudes */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .new-request { animation: pulse-red 2s infinite; }
    </style>

    <script type="module">
        import { checkAuthAndRedirect } from '../js/auth-guard.js';
        
        // Solo permite entrar si el usuario tiene Custom Claim: 'despachador'
        checkAuthAndRedirect('despachador').then(isAllowed => {
            if (isAllowed) {
                document.body.style.visibility = 'visible';
            }
        });
    </script>
</head>
<body class="bg-slate-900 min-h-screen text-gray-200">

    <header class="bg-slate-800/90 backdrop-blur-md shadow-lg p-4 flex justify-between items-center fixed top-0 w-full z-50 border-b border-slate-700">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-cyan-500 rounded-lg flex items-center justify-center shadow-lg">
                <i class="fas fa-headset text-white text-xs"></i>
            </div>
            <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-400 tracking-tighter">
                TAXIA CIMCO - DESPACHO
            </h1>
        </div>
        <div class="flex items-center space-x-6">
            <div class="hidden md:flex flex-col items-end">
                <span id="userEmail" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none text-right">Cargando...</span>
                <span class="text-[9px] text-cyan-500 font-black animate-pulse uppercase mt-1">Terminal Activa</span>
            </div>
            <button id="logoutBtn" class="bg-red-600/10 text-red-400 border border-red-600/30 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">
                Cerrar Sesión
            </button>
        </div>
    </header>

    <main class="pt-24 px-4 max-w-7xl mx-auto space-y-6 pb-10">
        
        
        <section class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black text-cyan-400 uppercase tracking-widest flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                    Monitor de Flota Global
                </h2>
                <div class="flex gap-2">
                    <span class="text-[9px] bg-slate-900 px-2 py-1 rounded border border-slate-700 text-slate-400 uppercase font-bold">Zoom Auto</span>
                </div>
            </div>
            <div id="map"></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <section class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 backdrop-blur-sm">
                <h3 class="font-black text-purple-400 text-xs mb-5 flex justify-between items-center tracking-widest uppercase">
                    <span><i class="fas fa-bell mr-2"></i> Pendientes</span>
                    <span id="count-pendientes" class="bg-purple-500 text-white px-3 py-0.5 rounded-full text-[10px]">0</span>
                </h3>
                <div id="list-pendientes" class="viajes-container space-y-4">
                    <p class="text-gray-500 italic text-center text-xs py-10">Esperando nuevas señales...</p>
                </div>
            </section>

            <section class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 border-t-4 border-t-yellow-500/50">
                <h3 class="font-black text-yellow-400 text-xs mb-5 flex justify-between items-center tracking-widest uppercase">
                    <span><i class="fas fa-satellite-dish mr-2"></i> En Canal</span>
                    <span id="count-despacho" class="bg-yellow-600 text-white px-3 py-0.5 rounded-full text-[10px]">0</span>
                </h3>
                <div id="list-despacho" class="viajes-container space-y-4">
                    <p class="text-gray-500 italic text-center text-xs py-10">Escaneando conductores disponibles...</p>
                </div>
            </section>

            <section class="bg-slate-800/50 p-5 rounded-2xl border border-slate-800 border-t-4 border-t-green-500/50">
                <h3 class="font-black text-green-400 text-xs mb-5 flex justify-between items-center tracking-widest uppercase">
                    <span><i class="fas fa-route mr-2"></i> En Curso</span>
                    <span id="count-activos" class="bg-green-600 text-white px-3 py-0.5 rounded-full text-[10px]">0</span>
                </h3>
                <div id="list-activos" class="viajes-container space-y-4">
                    <p class="text-gray-500 italic text-center text-xs py-10">No hay servicios en ruta...</p>
                </div>
            </section>

        </div>
    </main>

    <audio id="newTripSound" src="../js/sounds/notify.mp3" preload="auto"></audio>

    <script type="module" src="./js/despachador-panel.js"></script>

    <script>
        // --- Registro del Service Worker para Notificaciones PUSH ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw-despachador.js')
                    .then(reg => console.log('🚀 SW Operativo'))
                    .catch(err => console.log('❌ Error SW:', err));
            });
        }

        // --- Gestión de Permisos de Audio/Notificación ---
        document.body.addEventListener('click', () => {
            const audio = document.getElementById('newTripSound');
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; });
            
            if (Notification.permission === "default") {
                Notification.requestPermission();
            }
        }, { once: true });
    </script>
</body>
</html>
