<body class="bg-fondo text-gray-100 dark:bg-gray-900 dark:text-gray-100">

  <!-- 🔷 ENCABEZADO -->
  <header class="bg-panel dark:bg-gray-800 p-4 shadow flex justify-between items-center">
    <div>
      <h1 class="text-xl font-bold text-cyan-400">🏢 Centro de Control CIMCO</h1>
      <p id="userRole" class="text-xs text-gray-400">Panel: CEO / Administrador</p>
    </div>
    <div class="flex items-center space-x-2">
      <!-- Tabs según rol -->
      <button @click="tab='dashboard'" class="px-3 py-1 bg-cyan-700 hover:bg-cyan-600 rounded">Dashboard</button>
      <button @click="tab='estadisticas'" class="px-3 py-1 bg-green-700 hover:bg-green-600 rounded">Estadísticas</button>
      <button @click="tab='exportar'" class="px-3 py-1 bg-yellow-700 hover:bg-yellow-600 rounded">Exportar</button>

      <!-- Modo oscuro -->
      <button @click="darkMode = !darkMode; localStorage.setItem('modoOscuro', darkMode)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded">
        <span x-text="darkMode ? '☀️' : '🌙'"></span>
      </button>

      <button id="logoutBtn" class="px-3 py-1 bg-red-700 hover:bg-red-600 rounded">Salir</button>
    </div>
  </header>

  <!-- 🧭 CONTENIDO PRINCIPAL -->
  <main class="p-6 space-y-6">

    <!-- DASHBOARD -->
    <section x-show="tab === 'dashboard'" x-transition>
      <h2 class="text-2xl font-bold text-cyan-400 mb-4">📊 Panel General</h2>

      <!-- KPIs + MAPA EN VIVO -->
      <div class="grid lg:grid-cols-3 gap-4 mb-6">
        <!-- KPIs -->
        <div class="space-y-3 col-span-1">
          <div class="bg-gray-800 p-4 rounded-xl shadow">
            <h4 class="text-sm text-gray-400">Viajes en curso</h4>
            <div id="kpiActive" class="text-3xl font-bold text-yellow-400">0</div>
          </div>
          <div class="bg-gray-800 p-4 rounded-xl shadow">
            <h4 class="text-sm text-gray-400">Empresas conectadas (2m)</h4>
            <div id="kpiConnected" class="text-3xl font-bold text-cyan-400">0</div>
          </div>
          <div class="bg-gray-800 p-4 rounded-xl shadow">
            <h4 class="text-sm text-gray-400">Empresas inactivas</h4>
            <div id="kpiInactive" class="text-3xl font-bold text-red-400">0</div>
          </div>
        </div>

        <!-- MAPA -->
        <div class="col-span-2 bg-gray-800 p-2 rounded-xl shadow">
          <div id="mapLive" class="w-full h-[420px] rounded-lg"></div>
          <div id="logLive" class="text-xs text-gray-400 mt-2 max-h-28 overflow-y-auto"></div>
        </div>
      </div>

      <!-- CHARTS -->
      <div class="grid lg:grid-cols-3 gap-6 mt-6">
        <canvas id="chartEstados"></canvas>
        <canvas id="chartEmpresas"></canvas>
        <canvas id="chartDias"></canvas>
      </div>
    </section>

    <!-- ESTADÍSTICAS -->
    <section x-show="tab === 'estadisticas'" x-transition>
      <h2 class="text-2xl font-bold text-green-400 mb-4">📈 Estadísticas</h2>
      <table class="w-full border-collapse border border-gray-700">
        <thead class="bg-gray-700">
          <tr>
            <th class="p-2">Empresa</th>
            <th>Pendientes</th>
            <th>En curso</th>
            <th>Finalizados</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="tablaEstadisticas"></tbody>
      </table>
    </section>

    <!-- EXPORTAR -->
    <section x-show="tab === 'exportar'" x-transition>
      <h2 class="text-2xl font-bold text-yellow-400 mb-4">📄 Exportar Reportes</h2>
      <div>
        <button id="exportPdf" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded mr-3">📕 PDF</button>
        <button id="exportExcel" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded">📗 Excel</button>
      </div>
      <div id="tablaExportar" class="mt-6 bg-gray-800 p-4 rounded-xl shadow overflow-x-auto"></div>
    </section>
  </main>

  <!-- 🔊 SONIDO DE ALERTAS -->
  <audio id="alertSound" src="/js/sounds/notify.mp3" preload="auto"></audio>

  <!-- SCRIPTS -->
  <script type="module" src="./js/ceo-corporativo.js"></script>
  <script type="module" src="./js/ceo-centro-live.js"></script>
  <script type="module" src="/js/ceo-dashboard.js"></script>
  <script type="module" src="/js/ceo-notify.js"></script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
