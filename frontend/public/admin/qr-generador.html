<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR - TAXI A CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .qr-card { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn-active { border: 2px solid #3b82f6; background-color: #1e293b !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen text-slate-200">
    <div class="max-w-4xl w-full space-y-6 bg-slate-900 rounded-3xl shadow-2xl p-6 md:p-10 border border-slate-800">
        
        <div class="flex justify-between items-center bg-slate-800 rounded-2xl p-4 mb-6">
            <a href="ceo-panel.html" class="bg-slate-700 text-white font-bold py-2 px-4 rounded-lg hover:bg-slate-600 transition flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Volver
            </a>
            <h1 style="font-family: 'Orbitron';" class="text-xl md:text-2xl font-bold text-cyan-400 tracking-wider">TAXI A CIMCO</h1>
        </div>

        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white mb-2">GENERADOR DE QR</h2>
            <p class="text-slate-400">Selecciona un rol para generar el código de registro automático.</p>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            <button onclick="generateQR('pasajero')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center">
                <i class="fas fa-user text-blue-400 mb-2"></i> <span class="text-xs font-bold uppercase">Pasajero</span>
            </button>
            <button onclick="generateQR('mototaxi')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center">
                <i class="fas fa-motorcycle text-yellow-400 mb-2"></i> <span class="text-xs font-bold uppercase">Mototaxi</span>
            </button>
            <button onclick="generateQR('motoparrillero')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center">
                <i class="fas fa-users text-green-400 mb-2"></i> <span class="text-xs font-bold uppercase">Parrillero</span>
            </button>
            <button onclick="generateQR('motocarga')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center">
                <i class="fas fa-truck-pickup text-orange-400 mb-2"></i> <span class="text-xs font-bold uppercase">Motocarga</span>
            </button>
            <button onclick="generateQR('conductor_intermunicipal')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center">
                <i class="fas fa-bus text-purple-400 mb-2"></i> <span class="text-xs font-bold uppercase">Cond. Inter</span>
            </button>
            <button onclick="generateQR('despachador')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center">
                <i class="fas fa-user-cog text-red-400 mb-2"></i> <span class="text-xs font-bold uppercase">Despachador</span>
            </button>
            <button onclick="generateQR('admin')" class="app-btn bg-slate-800 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-700 transition flex flex-col items-center col-span-2 md:col-span-3">
                <i class="fas fa-crown text-yellow-500 mb-2"></i> <span class="text-xs font-bold uppercase">Admin / CEO</span>
            </button>
        </div>
        
        <div class="flex flex-col items-center mt-10">
            <div id="printArea" class="qr-card">
                <h3 id="qr-role-title" class="text-slate-900 font-black text-lg mb-4 uppercase tracking-tighter">TAXIA-CIMCO</h3>
                <div class="flex justify-center">
                    <canvas id="qr-canvas"></canvas>
                </div>
                <div id="role-badge" class="mt-4 bg-slate-900 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">SELECCIONAR ROL</div>
            </div>
        </div>

        <div id="action-buttons" class="flex justify-center gap-4 mt-8 hidden">
            <button onclick="downloadQR()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:bg-blue-700 transition flex items-center">
                <i class="fas fa-download mr-2"></i> Guardar
            </button>
            <button onclick="copyQRLink()" class="bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:bg-emerald-700 transition flex items-center">
                <i class="fas fa-copy mr-2"></i> Enlace
            </button>
        </div>
    </div>

    <script>
        const appUrls = {
            'pasajero': '/registro?role=pasajero',
            'mototaxi': '/registro?role=mototaxi',
            'motoparrillero': '/registro?role=motoparrillero',
            'motocarga': '/registro?role=motocarga',
            'conductor_intermunicipal': '/registro?role=cond_inter',
            'despachador': '/registro?role=despachador',
            'admin': '/registro?role=admin'
        };

        const roleNames = {
            'pasajero': 'Pasajero',
            'mototaxi': 'Mototaxi',
            'motoparrillero': 'Motoparrillero',
            'motocarga': 'Motocarga',
            'conductor_intermunicipal': 'Conductor Intermunicipal',
            'despachador': 'Despachador',
            'admin': 'Administrador / CEO'
        };

        let currentUrl = '';

        function generateQR(appType) {
            const canvas = document.getElementById('qr-canvas');
            const baseUrl = window.location.origin;
            currentUrl = baseUrl + appUrls[appType];

            // UI Updates
            document.getElementById('role-badge').innerText = roleNames[appType];
            document.getElementById('action-buttons').classList.remove('hidden');

            const qr = new QRious({
                element: canvas,
                value: currentUrl,
                size: 250,
                level: 'H',
                foreground: '#0f172a'
            });

            // Dibujar Texto Central
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(95, 105, 60, 40); // Fondo blanco pequeño para el logo/texto central
            ctx.fillStyle = '#1d4ed8';
            ctx.font = 'bold 12px Inter';
            ctx.textAlign = 'center';
            ctx.fillText('TAXIA', 125, 120);
            ctx.fillText('CIMCO', 125, 135);
        }

        function downloadQR() {
            const link = document.createElement('a');
            link.download = 'QR-TAXIA-CIMCO.png';
            link.href = document.getElementById('qr-canvas').toDataURL();
            link.click();
        }

        function copyQRLink() {
            navigator.clipboard.writeText(currentUrl);
            alert('¡Enlace copiado al portapapeles!');
        }
    </script>
</body>
</html>
