<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO Mapa de Monitoreo - TAXIA CIMCO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { font-family: 'Inter', sans-serif; }
        #map-canvas { height: 70vh; width: 100%; }
        .leaflet-container { border-radius: 0.75rem; }
    </style>

    <script>
        const APP_ENV = 'dev'; 
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🛰️</span> CEO: Mapa Global de Flota
            </h1>
            <nav class="hidden md:flex gap-4">
                <a href="ceo-dashboard.html" class="hover:bg-indigo-600 p-2 rounded-lg transition">Dashboard</a>
                <a href="ceo-centro-control.html" class="hover:bg-indigo-600 p-2 rounded-lg transition">Control</a>
                <a href="logout-ceo.html" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600 transition">Cerrar Sesión</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow">
        <div id="map-canvas" class="bg-white rounded-xl shadow-2xl border-4 border-indigo-500">
            </div>

        <div id="status-panel" class="mt-4 p-4 bg-white rounded-xl shadow-xl">
            <h2 class="text-xl font-semibold text-indigo-700 mb-3">Resumen Global en Tiempo Real</h2>
            <div id="fleet-summary" class="grid grid-cols-2 md:grid-cols-5 gap-4 text-center">
                <div class="p-3 bg-green-100 rounded-lg border border-green-200">
                    <p class="text-2xl font-bold text-green-700" id="count-online">0</p>
                    <p class="text-xs text-green-600 uppercase font-bold">En Línea</p>
                </div>
                <div class="p-3 bg-yellow-100 rounded-lg border border-yellow-200">
                    <p class="text-2xl font-bold text-yellow-700" id="count-busy">0</p>
                    <p class="text-xs text-yellow-600 uppercase font-bold">Ocupados</p>
                </div>
                <div class="p-3 bg-blue-100 rounded-lg border border-blue-200">
                    <p class="text-2xl font-bold text-blue-700" id="count-total">0</p>
                    <p class="text-xs text-blue-600 uppercase font-bold">Total Flota</p>
                </div>
                <div class="col-span-2 p-3 bg-gray-50 rounded-lg border border-gray-200 flex items-center justify-around">
                    <span class="text-xs font-bold text-gray-500">TIPOS ACTIVOS:</span>
                    <div class="flex gap-2" id="active-types-icons">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module" src="/js/firebase/firebase-loader.js"></script>

    <script type="module">
        import { inicializarMapaSeguimiento } from "./js/ceo-mapa.js";

        // Esperar a que el Loader de Firebase exponga los objetos en window
        window.addEventListener('load', () => {
            const checkFirebase = setInterval(() => {
                if (window.db && window.firebaseUtils) {
                    clearInterval(checkFirebase);
                    console.log("✅ Firebase detectado. Inicializando Mapa Global...");
                    inicializarMapaSeguimiento();
                }
            }, 500); // Reintenta cada 500ms
        });
    </script>
</body>
</html>
