<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Pasajero</title>
    <!-- Tu archivo CSS de Tailwind/producción -->
    <link href="/css/output.css" rel="stylesheet" />
    
    <!--  
      *** GESTIÓN DE ENTORNO (Estándar CIMCO) ***
      Define si se debe usar la configuración de 'prod' o 'piloto'.
    -->
    <script>
      // Establece el entorno de la aplicación.
      // "prod" para la base de datos real. "piloto" para emuladores.
      window.APP_ENV = "prod"; 
    </script>

    <!--  
      *** 1. Carga del Firebase Loader (Ruta Absoluta Confirmada) ***
      Debe cargar ANTES que cualquier otro script que use Firebase (window.firebaseAuth, etc.).
    -->
    <script type="module" src="/js/firebase/firebase-loader.js"></script>

    <!-- 
      *** 2. Tu script de lógica de Login (Ruta Absoluta para consistencia) ***
      Este script usará la configuración de Firebase cargada en el paso 1.
    -->
    <script type="module" src="/pasajero/js/pasajero-login.js"></script>
</head>
<body class="min-h-screen flex flex-col justify-center items-center bg-gradient-to-br from-indigo-500 to-blue-600 text-white p-4">
    <div class="w-full max-w-sm p-8 space-y-6 bg-white shadow-2xl rounded-2xl transition duration-500 ease-in-out transform hover:scale-[1.02]">
        <h2 class="text-3xl font-extrabold text-center text-gray-900">
            TAXIA CIMCO
        </h2>
        <p class="text-center text-sm text-gray-500">
            Accede a tu cuenta de Pasajero
        </p>

        <!-- Formulario que será manejado por pasajero-login.js -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 text-left mb-1">
                    Correo Electrónico
                </label>
                <input type="email" id="email" name="email" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out text-gray-900"
                        placeholder="ejemplo@correo.com">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 text-left mb-1">
                    Contraseña
                </label>
                <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out text-gray-900"
                        placeholder="••••••••">
            </div>
            
            <button type="submit" id="loginButton"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-lg text-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-300 ease-in-out transform hover:-translate-y-0.5">
                Iniciar Sesión
            </button>
            
            <div id="loadingIndicator" class="text-center text-sm text-indigo-600 hidden">
                Cargando...
            </div>
            <p id="errorMessage" class="text-sm text-red-600 mt-3 text-center"></p>
        </form>
        
        <div class="text-center text-sm text-gray-600 pt-4 border-t border-gray-200">
            ¿No tienes cuenta? 
            <a href="registro-pasajero.html" class="font-medium text-indigo-600 hover:text-indigo-500 transition duration-150">
                Regístrate aquí
            </a>
        </div>
    </div>
    <footer class="mt-10 text-xs opacity-80">
        © 2025 CIMCO Smart Mobility
    </footer>
</body>
</html>
