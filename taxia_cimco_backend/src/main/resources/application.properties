==========================================

CONFIGURACIÓN DEL SERVIDOR

==========================================

Definimos el puerto 8081 para evitar conflictos con otros servicios (como Jenkins o Tomcat por defecto)

server.port=8081

==========================================

CONFIGURACIÓN DE FIREBASE / GOOGLE CLOUD

==========================================

Ruta al archivo JSON de tu cuenta de servicio (asegúrate de que el nombre coincida)

El archivo debe estar en src/main/resources/

firebase.config.path=classpath:serviceAccountKey.json

ID del proyecto de Firebase (CIMCO)

firebase.project.id=cimco-api

==========================================

CONFIGURACIÓN DE SERIALIZACIÓN (JSON)

==========================================

Esto evita errores si Firestore devuelve campos que no están mapeados en tu clase Usuario

spring.jackson.deserialization.fail-on-unknown-properties=false

Formato de fechas para que sean legibles en el Frontend

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Bogota

==========================================

LOGGING (OPCIONAL - ÚTIL PARA DEBUG)

==========================================

Muestra más detalles en la consola si hay errores de Spring

logging.level.org.springframework.web=INFO
https://www.google.com/search?q=logging.level.com.cimco.api=DEBUG