<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Conductor - TAXIA CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-neon-cyan { color: #00F0FF; }
        .text-neon-red { color: #FF007E; } 
        .bg-gradient-to-r-neon { background-image: linear-gradient(to right, #00F0FF, #B300F2); }
        .card-shadow-neon { box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        .bg-nequi-pink { background-color: #FF007E; } 
        .bg-nequi-pink-hover:hover { background-color: #d10068; }
        
        .trip-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .trip-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px -5px rgba(255, 0, 126, 0.4);
        }
        .active-trip-card {
            border: 3px solid #00F0FF; /* Resaltar viaje activo */
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            animation: pulse-border 1.5s infinite alternate;
        }

        @keyframes pulse-border {
            from {
                box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            }
            to {
                box-shadow: 0 0 40px rgba(0, 240, 255, 0.8);
            }
        }
    </style>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>
<script type="module" src="/js/firebase/firebase-mode-manager.js"></script>
</head>
<body class="bg-slate-900 text-gray-200 min-h-screen p-4 sm:p-8">

    <!-- Header / Info Conductor -->
    <header class="bg-slate-800 shadow-xl rounded-xl p-4 mb-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
            <h1 class="text-2xl font-extrabold text-white mb-2 md:mb-0">
                <i class="fas fa-motorcycle mr-2 text-neon-cyan"></i> Panel del Conductor
            </h1>
            <div class="text-right">
                <p class="text-sm font-semibold text-gray-400">
                    <span id="userName">Cargando Nombre</span> (<span id="userRole" class="text-neon-cyan capitalize">Rol</span>)
                </p>
                <button id="logoutBtn" class="mt-2 bg-red-600 hover:bg-red-700 text-white font-bold py-1 px-3 rounded-lg text-sm transition duration-300">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto max-w-6xl">
        
        <!-- Alerta de Saldo Pendiente -->
        <div id="balanceAlert" class="bg-red-900/50 border border-red-500 text-red-300 p-4 rounded-xl mb-8 hidden transition duration-500">
            <div class="flex items-center justify-between">
                <div>
                    <i class="fas fa-exclamation-triangle mr-2"></i> 
                    Tienes un **Saldo Pendiente** de <span id="pendingAmount" class="font-extrabold text-xl text-neon-red">$0.00</span>.
                    <p id="alertMessage" class="text-sm mt-1">Paga para seguir recibiendo servicios.</p>
                </div>
                <a href="pago-nequi.html" class="bg-nequi-pink bg-nequi-pink-hover text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-300">
                    <i class="fas fa-qrcode mr-2"></i> Pagar con NEQUI
                </a>
            </div>
        </div>

        <!-- MÃ©tricas / Estado -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            
            <!-- Saldo Pendiente -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 card-shadow-neon text-center">
                <h2 class="text-lg font-bold text-gray-400 mb-2">Comisión Pendiente</h2>
                <p id="saldoPendienteDisplay" class="text-4xl font-extrabold text-neon-red">$0.00</p>
            </div>

            <!-- Viajes Disponibles -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 card-shadow-neon text-center">
                <h2 class="text-lg font-bold text-gray-400 mb-2">Viajes Pendientes</h2>
                <p id="availableTripsCount" class="text-4xl font-extrabold text-neon-cyan">0</p>
            </div>

            <!-- Estado de ConexiÃ³n (Simulado) -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 card-shadow-neon text-center">
                <h2 class="text-lg font-bold text-gray-400 mb-2">Estado</h2>
                <p id="connectionStatus" class="text-4xl font-extrabold text-green-500">
                    <i class="fas fa-circle text-sm mr-2"></i> Activo
                </p>
            </div>
        </div>

        <!-- VIAJE ACTIVO DEL CONDUCTOR -->
        <section id="currentTripSection" class="mb-10 hidden">
            <h2 class="text-3xl font-extrabold text-white mb-6 border-b border-neon-cyan pb-2">
                <i class="fas fa-route mr-2 text-neon-cyan"></i> Viaje Activo
            </h2>
            <div id="activeTripContainer">
                <!-- El viaje activo se renderizará aquí -->
            </div>
        </section>

        <!-- Lista de Viajes Pendientes -->
        <section>
            <h2 class="text-3xl font-extrabold text-white mb-6 border-b border-slate-700 pb-2">
                <i class="fas fa-map-marked-alt mr-2 text-neon-cyan"></i> Nuevas Solicitudes de Viaje
            </h2>
            
            <div id="tripsList" class="space-y-4">
                <p id="noTripsMessage" class="text-center text-gray-500 p-6 bg-slate-800 rounded-xl">
                    <i class="fas fa-mug-hot mr-2"></i> Por ahora no hay viajes pendientes.
                </p>
                <!-- Los viajes se cargarán aquí -->
            </div>
        </section>

        <!-- Modal de Error Personalizado -->
        <div id="errorModal" class="fixed inset-0 bg-black bg-opacity-75 hidden items-center justify-center p-4 z-50">
            <div class="bg-slate-800 p-6 rounded-xl max-w-sm w-full border border-red-500 shadow-2xl">
                <h3 class="text-xl font-bold text-neon-red mb-3">Notificación</h3>
                <p id="modalMessage" class="text-gray-300 mb-4"></p>
                <button onclick="document.getElementById('errorModal').classList.add('hidden'); document.getElementById('errorModal').classList.remove('flex');" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                    Entendido
                </button>
            </div>
        </div>

    </main>

    <!-- Firebase Lógica -->
    <script type="module">

        // --- Constantes de Reglas de Negocio ---
        const BALANCE_LIMIT = 10000; // $10,000 COP
        const COMMISSION_RATES = {
            mototaxi: 200, // $200 COP por servicio
            motoparrillero: 200, // $200 COP por servicio
            motocarga: 500, // $500 COP por servicio
            despachador: 0, // No paga por servicio
            intermunicipal: 0 // No paga por servicio
        };

        // --- ConfiguraciÃ³n de Firebase ---
        setLogLevel('debug'); 
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        // Colecciones PÃšBLICAS
        const USUARIOS_COLLECTION = `artifacts/${appId}/public/data/usuarios`;
        const VIAJES_COLLECTION = `artifacts/${appId}/public/data/viajes`; 

        // InicializaciÃ³n de la app
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elementos del DOM
        const userNameEl = document.getElementById("userName");
        const userRoleEl = document.getElementById("userRole");
        const saldoPendienteDisplayEl = document.getElementById("saldoPendienteDisplay");
        const balanceAlertEl = document.getElementById("balanceAlert");
        const pendingAmountEl = document.getElementById("pendingAmount");
        const alertMessageEl = document.getElementById("alertMessage");
        const tripsListEl = document.getElementById("tripsList");
        const noTripsMessageEl = document.getElementById("noTripsMessage");
        const availableTripsCountEl = document.getElementById("availableTripsCount");
        const logoutBtn = document.getElementById("logoutBtn");
        const errorModalEl = document.getElementById("errorModal");
        const modalMessageEl = document.getElementById("modalMessage");
        const currentTripSectionEl = document.getElementById("currentTripSection");
        const activeTripContainerEl = document.getElementById("activeTripContainer");

        let currentUserId = null;
        let currentDriverData = null;
        
        // FunciÃ³n para mostrar el modal de error/notificaciÃ³n
        function showModal(message) {
            modalMessageEl.textContent = message;
            errorModalEl.classList.remove('hidden');
            errorModalEl.classList.add('flex');
        }

        // --- Escucha de Estado de AutenticaciÃ³n ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                escucharDatosConductor(currentUserId);
                escucharViajesPendientes();
                escucharViajeActual(currentUserId); // Nuevo listener para el viaje activo
            } else {
                console.log("No hay sesiÃ³n activa. Redirigiendo a registro/login.");
                // Redirigir si no hay sesiÃ³n (o mostrar un mensaje de error)
                window.location.href = "registro-conductor.html"; 
            }
        });

        // --- Escucha de Datos del Conductor en Firestore ---
        function escucharDatosConductor(uid) {
            const userDocRef = doc(db, USUARIOS_COLLECTION, uid);

            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentDriverData = data;
                    
                    const rol = data.rol || 'desconocido';
                    
                    if (!Object.keys(COMMISSION_RATES).includes(rol) && rol !== 'intermunicipal') {
                             console.error("Acceso denegado. Rol incorrecto:", rol);
                             signOut(auth);
                             return;
                    }

                    userNameEl.textContent = data.nombre || data.email || "Conductor";
                    userRoleEl.textContent = rol;
                    
                    const balance = data.saldoPendiente || 0; 
                    saldoPendienteDisplayEl.textContent = `$${balance.toLocaleString('es-CO', { minimumFractionDigits: 0 })}`;

                    // LÃ³gica de Alerta y Bloqueo de Saldo
                    const commissionDue = (rol in COMMISSION_RATES) ? COMMISSION_RATES[rol] : 0;

                    if (commissionDue > 0 && balance >= BALANCE_LIMIT) {
                        // El conductor ha alcanzado el lÃ­mite y es un rol de pago
                        balanceAlertEl.classList.remove('hidden');
                        pendingAmountEl.textContent = `$${balance.toLocaleString('es-CO', { minimumFractionDigits: 0 })}`;
                        alertMessageEl.innerHTML = `**Â¡LÃ­mite Excedido!** No recibirÃ¡s mÃ¡s servicios hasta ponerte paz y salvo.`;
                        document.getElementById("connectionStatus").innerHTML = `<i class="fas fa-circle text-sm mr-2"></i> Bloqueado`;
                        document.getElementById("connectionStatus").classList.replace('text-green-500', 'text-neon-red');
                    } else if (commissionDue > 0 && balance > 0) {
                        // El conductor tiene saldo pendiente pero aÃºn no alcanza el lÃ­mite
                        balanceAlertEl.classList.remove('hidden');
                        pendingAmountEl.textContent = `$${balance.toLocaleString('es-CO', { minimumFractionDigits: 0 })}`;
                        alertMessageEl.textContent = `Tienes un saldo pendiente. Recuerda pagar antes de alcanzar los $${BALANCE_LIMIT.toLocaleString('es-CO', { minimumFractionDigits: 0 })}.`;
                        document.getElementById("connectionStatus").innerHTML = `<i class="fas fa-circle text-sm mr-2"></i> Activo`;
                        document.getElementById("connectionStatus").classList.replace('text-neon-red', 'text-green-500');
                    }
                     else {
                        balanceAlertEl.classList.add('hidden');
                        document.getElementById("connectionStatus").innerHTML = `<i class="fas fa-circle text-sm mr-2"></i> Activo`;
                        document.getElementById("connectionStatus").classList.replace('text-neon-red', 'text-green-500');
                    }

                } else {
                    console.error("Documento de usuario no encontrado en Firestore.");
                }
            }, (error) => {
                console.error("Error al escuchar datos del conductor:", error);
            });
        }
        
        // --- Escucha de Viajes Pendientes ---
        function escucharViajesPendientes() {
            // Consulta para buscar solo viajes en estado "Pendiente"
            const q = query(collection(db, VIAJES_COLLECTION), where("estado", "==", "Pendiente"));

            onSnapshot(q, (snapshot) => {
                const trips = [];
                snapshot.forEach((doc) => {
                    trips.push({ id: doc.id, ...doc.data() });
                });
                renderTrips(trips);
            }, (error) => {
                console.error("Error al escuchar viajes pendientes:", error);
            });
        }

        // --- Escucha de Viaje Activo (En Curso o En Ruta) ---
        function escucharViajeActual(conductorId) {
            // Busca viajes asignados a este conductor y que estÃ©n "En Curso" o "En Ruta"
            const q = query(
                collection(db, VIAJES_COLLECTION), 
                where("conductorId", "==", conductorId),
                where("estado", "in", ["En Curso", "En Ruta"]) // El conductor solo deberÃ­a tener uno
            );

            onSnapshot(q, (snapshot) => {
                const activeTrip = snapshot.docs[0] ? { id: snapshot.docs[0].id, ...snapshot.docs[0].data() } : null;
                renderCurrentTrip(activeTrip);
            }, (error) => {
                console.error("Error al escuchar viaje activo:", error);
            });
        }

        // --- Renderizar Viajes Pendientes ---
        function renderTrips(trips) {
            tripsListEl.innerHTML = '';
            // Filtramos los viajes pendientes que no estÃ©n en "En Curso" o "En Ruta" (doble chequeo)
            const pendingTrips = trips.filter(t => t.estado === "Pendiente"); 
            availableTripsCountEl.textContent = pendingTrips.length;

            if (pendingTrips.length === 0) {
                noTripsMessageEl.classList.remove('hidden');
                tripsListEl.appendChild(noTripsMessageEl);
                return;
            } else {
                noTripsMessageEl.classList.add('hidden');
            }

            pendingTrips.forEach(trip => {
                const tripDiv = document.createElement('div');
                tripDiv.className = 'trip-card bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center';
                tripDiv.innerHTML = `
                    <div class="mb-3 sm:mb-0">
                        <p class="text-xl font-bold text-white mb-1">
                            <i class="fas fa-arrow-right text-neon-cyan mr-2"></i> ${trip.origen} <i class="fas fa-long-arrow-alt-right mx-2 text-gray-500"></i> ${trip.destino}
                        </p>
                        <p class="text-sm text-gray-400">Pasajero: ${trip.emailPasajero || 'ID: ' + trip.pasajeroId.substring(0, 8) + '...'}</p>
                        <p class="text-xs text-gray-500 mt-1">Servicio: <span class="capitalize">${trip.servicio}</span> | Solicitado: ${new Date(trip.fechaSolicitud?.toDate ? trip.fechaSolicitud.toDate() : Date.now()).toLocaleTimeString()}</p>
                    </div>
                    <button data-trip-id="${trip.id}" class="take-trip-btn bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-300 w-full sm:w-auto">
                        <i class="fas fa-hand-point-up mr-1"></i> Tomar Viaje
                    </button>
                `;
                tripsListEl.appendChild(tripDiv);
            });

            document.querySelectorAll('.take-trip-btn').forEach(button => {
                button.removeEventListener('click', handleTakeTrip); // Prevenir duplicados
                button.addEventListener('click', handleTakeTrip);
            });
        }

        // --- Renderizar Viaje Activo ---
        function renderCurrentTrip(trip) {
            activeTripContainerEl.innerHTML = '';

            if (!trip) {
                currentTripSectionEl.classList.add('hidden');
                return;
            }

            currentTripSectionEl.classList.remove('hidden');
            
            const statusColor = trip.estado === 'En Curso' ? 'text-yellow-400' : 'text-green-400';
            const statusIcon = trip.estado === 'En Curso' ? 'fa-spinner fa-spin' : 'fa-check-circle';
            const buttonText = trip.estado === 'En Curso' ? 'Iniciar Ruta (Recoger Pasajero)' : 'Finalizar Viaje';
            const buttonClass = trip.estado === 'En Curso' ? 'bg-indigo-600 hover:bg-indigo-700 start-trip-btn' : 'bg-red-600 hover:bg-red-700 finish-trip-btn';
            
            const tripDiv = document.createElement('div');
            tripDiv.className = 'active-trip-card bg-slate-800 p-6 rounded-xl flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0';
            tripDiv.innerHTML = `
                <div class="flex-1 text-left w-full md:w-auto">
                    <p class="text-xs font-bold uppercase text-neon-cyan mb-1">VIAJE ACTIVO - ID: ${trip.id.substring(0, 10)}...</p>
                    <p class="text-2xl font-extrabold text-white mb-2">
                        <i class="fas fa-map-pin mr-2 text-gray-500"></i> ${trip.origen}
                        <i class="fas fa-angle-double-right mx-3 text-neon-cyan"></i>
                        <i class="fas fa-flag-checkered mr-2 text-gray-500"></i> ${trip.destino}
                    </p>
                    <p class="text-lg font-semibold ${statusColor}">
                        <i class="fas ${statusIcon} mr-2"></i> Estado: <span class="font-bold">${trip.estado}</span>
                    </p>
                    <p class="text-sm text-gray-400 mt-1">Servicio: <span class="capitalize">${trip.servicio}</span> | Pasajero: ${trip.emailPasajero || 'ID: ' + trip.pasajeroId.substring(0, 8) + '...'}</p>
                </div>
                <div class="w-full md:w-auto">
                    <button data-trip-id="${trip.id}" class="${buttonClass} text-white font-bold py-3 px-6 rounded-lg shadow-xl transition duration-300 w-full">
                        <i class="fas fa-location-arrow mr-1"></i> ${buttonText}
                    </button>
                </div>
            `;
            activeTripContainerEl.appendChild(tripDiv);

            // AÃ±adir listeners a los botones del viaje activo
            const startBtn = activeTripContainerEl.querySelector('.start-trip-btn');
            if (startBtn) {
                startBtn.addEventListener('click', () => handleStartTrip(trip.id));
            }
            
            const finishBtn = activeTripContainerEl.querySelector('.finish-trip-btn');
            if (finishBtn) {
                finishBtn.addEventListener('click', () => handleFinishTrip(trip.id));
            }
        }


        // --- LÃ³gica para Tomar Viaje (Pendiente -> En Curso) ---
        async function handleTakeTrip(event) {
            const tripId = event.currentTarget.getAttribute('data-trip-id');
            const button = event.currentTarget;

            // 1. ValidaciÃ³n bÃ¡sica
            if (!tripId || !currentUserId || !currentDriverData) {
                showModal("Error interno: Faltan datos de la sesiÃ³n o del viaje.");
                return;
            }

            // 2. Verificar si ya tiene un viaje activo
            if (!currentTripSectionEl.classList.contains('hidden')) {
                 showModal("Ya tienes un viaje activo. Debes finalizar el viaje actual antes de tomar uno nuevo.");
                 return;
            }
            
            const driverRole = currentDriverData.rol;
            const currentBalance = currentDriverData.saldoPendiente || 0;
            const commission = COMMISSION_RATES[driverRole] || 0;

            // 3. Aplicar LÃ³gica de Bloqueo por Saldo (solo para roles con comisiÃ³n)
            if (commission > 0 && currentBalance >= BALANCE_LIMIT) {
                showModal(`Tu saldo pendiente ($${currentBalance.toLocaleString()}) ha excedido el lÃ­mite de $${BALANCE_LIMIT.toLocaleString()}. Debes pagar para tomar mÃ¡s servicios.`);
                return;
            }

            button.disabled = true;
            button.textContent = 'Tomando...';

            try {
                const tripDocRef = doc(db, VIAJES_COLLECTION, tripId);
                const userDocRef = doc(db, USUARIOS_COLLECTION, currentUserId);
                
                // 4. Preparar la actualizaciÃ³n del viaje: Pendiente -> En Curso (Asignado)
                const tripUpdateData = {
                    estado: "En Curso", // Estado 1: Asignado al conductor
                    conductorId: currentUserId,
                    conductorRol: driverRole,
                    fechaTomado: serverTimestamp() 
                };

                // 5. Preparar la actualizaciÃ³n del saldo del conductor (si aplica, solo se cobra al aceptar)
                if (commission > 0) {
                    const newBalance = currentBalance + commission;
                    
                    await updateDoc(userDocRef, {
                        saldoPendiente: newBalance
                    });
                    
                    console.log(`Saldo actualizado de $${currentBalance} a $${newBalance} (ComisiÃ³n: $${commission})`);
                }

                // 6. Actualizar el documento del viaje
                await updateDoc(tripDocRef, tripUpdateData);
                
                showModal(`Â¡Viaje tomado con Ã©xito! DirÃ­gete a la secciÃ³n de Viaje Activo para empezar la ruta.`);
                button.textContent = 'âœ“ Tomado';
                
                // DespuÃ©s de 2 segundos, eliminar el botÃ³n (ya que el listener actualizarÃ¡ la lista)
                setTimeout(() => {
                   button.closest('.trip-card').remove();
                }, 2000);

            } catch (error) {
                console.error("Error al tomar el viaje:", error);
                showModal(`Fallo al aceptar el servicio. Intenta de nuevo. (${error.message})`);
                button.disabled = false;
                button.textContent = 'Tomar Viaje';
            }
        }
        
        // --- LÃ³gica para Iniciar Ruta (En Curso -> En Ruta) ---
        async function handleStartTrip(tripId) {
             const button = activeTripContainerEl.querySelector('.start-trip-btn');
             if (button) {
                button.disabled = true;
                button.textContent = 'Cargando...';
             }

            try {
                const tripDocRef = doc(db, VIAJES_COLLECTION, tripId);
                
                await updateDoc(tripDocRef, {
                    estado: "En Ruta", // Estado 2: Conductor en camino al pasajero
                    fechaEnRuta: serverTimestamp() 
                });
                
                console.log(`Viaje ${tripId} ha pasado a 'En Ruta'.`);
                showModal("Â¡Ruta iniciada! Ya te diriges a recoger al pasajero.");

            } catch (error) {
                console.error("Error al iniciar la ruta:", error);
                showModal(`Fallo al cambiar el estado a En Ruta. (${error.message})`);
                if (button) {
                    button.disabled = false;
                    button.textContent = 'Error al Iniciar';
                }
            }
        }
        
        // --- LÃ³gica para Finalizar Viaje (En Ruta -> Finalizado) ---
        async function handleFinishTrip(tripId) {
             const button = activeTripContainerEl.querySelector('.finish-trip-btn');
             if (button) {
                button.disabled = true;
                button.textContent = 'Finalizando...';
             }

            try {
                const tripDocRef = doc(db, VIAJES_COLLECTION, tripId);
                
                await updateDoc(tripDocRef, {
                    estado: "Finalizado", // Estado 3: Viaje completado
                    fechaFinalizado: serverTimestamp() 
                    // No se cobra comisiÃ³n aquÃ­, ya se hizo al aceptar
                });
                
                console.log(`Viaje ${tripId} ha sido 'Finalizado'.`);
                showModal("Â¡Viaje Finalizado con Ã©xito! Puedes tomar una nueva solicitud.");

            } catch (error) {
                console.error("Error al finalizar el viaje:", error);
                showModal(`Fallo al finalizar el servicio. (${error.message})`);
                if (button) {
                    button.disabled = false;
                    button.textContent = 'Error al Finalizar';
                }
            }
        }


        // --- Cerrar SesiÃ³n ---
        logoutBtn.addEventListener("click", async () => {
             try {
                 await signOut(auth);
                 window.location.href = "registro-conductor.html"; 
             } catch (error) {
                 console.error("Error al cerrar sesiÃ³n:", error);
             }
        });
        
        // --- InicializaciÃ³n Principal (Manejo de Token) ---
        async function initApp() {
            // Intenta iniciar sesiÃ³n con el token si existe (proporcionado por Canvas)
            if (!auth.currentUser && initialAuthToken) {
                try {
                    await signInWithCustomToken(auth, initialAuthToken);
                } catch (error) {
                    console.warn("Token de autenticaciÃ³n no vÃ¡lido. Intentando anÃ³nimo.");
