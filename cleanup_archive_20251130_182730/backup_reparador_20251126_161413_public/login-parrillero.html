<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login Motoparrillero - TAXIA CIMCO</title>
  <link rel="manifest" href="/motoparrillero/manifest-motoparrillero.webmanifest">
  <script src="https://cdn.tailwindcss.com"></script>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>
<script type="module" src="/js/firebase/firebase-mode-manager.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-slate-900 text-gray-100">
  <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-purple-400">Motoparrillero - TAXIA CIMCO</h1>
    </div>

    <form id="loginForm" class="space-y-4">
      <input id="email" type="email" placeholder="Correo electrónico" class="w-full p-3 bg-slate-700 rounded-lg" required />
      <input id="password" type="password" placeholder="Contraseña" class="w-full p-3 bg-slate-700 rounded-lg" required />
      <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-500 py-3 rounded-lg font-bold hover:scale-105 transition">
        Iniciar sesión
      </button>
    </form>
    <p id="status" class="text-center text-sm text-gray-400 mt-3"></p>
  </div>

  <script type="module" src="./js/motoparrillero-login.js"></script>
<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
