<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas CEO - TAXIA CIMCO</title>

  <!-- Tailwind CSS -->

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- jsPDF y autoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

  <!-- SheetJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Script principal -->
  <script type="module" src="./js/ceo-estadisticas.js"></script>
  <link rel="stylesheet" href="./css/output.css" />`r`n</head>

<body class="bg-gray-900 text-gray-200 min-h-screen">
  <header class="bg-gray-800 shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-cyan-400">📊 Panel de Estadísticas - CEO CIMCO</h1>
    <div>
      <button id="refreshBtn" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded mr-2">🔄 Actualizar</button>
      <button id="exportExcelBtn" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded mr-2">📗 Exportar Excel</button>
      <button id="exportPdfBtn" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded mr-2">📕 Exportar PDF</button>
      <button id="logoutBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded">Salir</button>
    </div>
  </header>

  <main class="p-6 space-y-6">

    <!-- Filtros -->
    <section class="bg-gray-800 p-4 rounded-xl shadow">
      <h2 class="text-lg font-semibold mb-3">Filtros</h2>
      <div class="flex flex-wrap gap-4">
        <div>
          <label class="block text-sm mb-1">Estado:</label>
          <select id="estadoFiltro" class="bg-gray-700 px-3 py-2 rounded">
            <option value="">Todos</option>
            <option value="Pendiente">Pendiente</option>
            <option value="En curso">En curso</option>
            <option value="Finalizado">Finalizado</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">Desde:</label>
          <input id="fechaInicio" type="date" class="bg-gray-700 px-3 py-2 rounded">
        </div>
        <div>
          <label class="block text-sm mb-1">Hasta:</label>
          <input id="fechaFin" type="date" class="bg-gray-700 px-3 py-2 rounded">
        </div>
        <button id="filtrarBtn" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded self-end">Filtrar</button>
      </div>
    </section>

    <!-- Gráficos -->
    <section class="grid md:grid-cols-2 gap-6">
      <div class="bg-gray-800 p-4 rounded-xl shadow">
        <h3 class="font-semibold text-cyan-400 mb-2">Viajes por Estado</h3>
        <canvas id="graficoEstados"></canvas>
      </div>
      <div class="bg-gray-800 p-4 rounded-xl shadow">
        <h3 class="font-semibold text-cyan-400 mb-2">Viajes por Empresa</h3>
        <canvas id="graficoEmpresas"></canvas>
      </div>
    </section>

    <!-- Tabla -->
    <section class="bg-gray-800 p-4 rounded-xl shadow">
      <h3 class="font-semibold text-cyan-400 mb-3">Listado de Viajes</h3>
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead>
            <tr class="bg-gray-700 text-cyan-400">
              <th class="px-4 py-2 text-left">Empresa</th>
              <th class="px-4 py-2 text-left">Estado</th>
              <th class="px-4 py-2 text-left">Fecha</th>
              <th class="px-4 py-2 text-left">Origen</th>
              <th class="px-4 py-2 text-left">Destino</th>
            </tr>
          </thead>
          <tbody id="tablaViajes"></tbody>
        </table>
      </div>
    </section>

  </main>
<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
