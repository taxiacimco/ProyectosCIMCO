<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Conductor Intermunicipal - TAXIA CIMCO</title>
  <link rel="icon" href="../icons/conductor-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; font-family: 'Inter', sans-serif; }
  </style>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>
<script type="module" src="/js/firebase/firebase-mode-manager.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-200">
  <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-6">
      <img src="../icons/conductor-192.png" class="w-20 mx-auto mb-3" />
      <h1 class="text-2xl font-bold text-cyan-400">Conductor Intermunicipal</h1>
      <p class="text-gray-400 text-sm">Acceso al panel de rutas</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm">Correo</label>
        <input id="email" type="email" class="w-full p-3 bg-slate-700 rounded-lg" required />
      </div>
      <div>
        <label class="block text-sm">Contraseña</label>
        <input id="password" type="password" class="w-full p-3 bg-slate-700 rounded-lg" required />
      </div>
      <button type="submit"
        class="w-full bg-gradient-to-r from-cyan-500 to-green-500 py-3 rounded-lg font-bold hover:scale-105 transition">
        Iniciar sesión
      </button>
    </form>
    <p id="status" class="text-center text-gray-400 text-sm mt-3"></p>
  </div>

  <script type="module">
    import { loginInter } from "./js/inter-login.js";
    const form = document.getElementById("loginForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Verificando...";
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      await loginInter(email, password);
    });
  </script>
<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
