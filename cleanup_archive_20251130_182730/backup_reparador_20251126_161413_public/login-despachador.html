<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Despachador Intermunicipal - TAXIA CIMCO</title>
  <link rel="icon" href="../icons/despachador-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
  </style>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>
<script type="module" src="/js/firebase/firebase-mode-manager.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-200">
  <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-8">
      <img src="../icons/despachador-192.png" class="mx-auto w-20 mb-3" />
      <h1 class="text-3xl font-bold text-cyan-400">Despachador Intermunicipal</h1>
      <p class="text-gray-400 text-sm mt-1">Acceso a la flota de conductores</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Correo</label>
        <input id="email" type="email" placeholder="correo@ejemplo.com"
          class="w-full p-3 bg-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-400" required />
      </div>
      <div>
        <label class="block text-sm mb-1">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••"
          class="w-full p-3 bg-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-400" required />
      </div>
      <button type="submit"
        class="w-full bg-gradient-to-r from-green-600 to-cyan-500 py-3 rounded-lg font-bold hover:scale-105 transition">
        Iniciar Sesión
      </button>
    </form>

    <p id="status" class="text-center text-gray-400 text-sm mt-4"></p>
  </div>

  <script type="module">
    import { loginDespachador } from "./js/despachador-login.js";
    const form = document.getElementById("loginForm");
    const status = document.getElementById("status");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Verificando...";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      await loginDespachador(email, password);
    });
  </script>
<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
