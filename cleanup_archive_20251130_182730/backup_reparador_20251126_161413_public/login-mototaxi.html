<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login Mototaxi - TAXIA CIMCO</title>
  <link rel="manifest" href="/mototaxi/manifest-mototaxi.webmanifest">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; background:#0f172a; } </style>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>
<script type="module" src="/js/firebase/firebase-mode-manager.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-100">
  <div class="w-full max-w-md p-8 bg-slate-800 rounded-xl shadow-xl">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-extrabold text-cyan-400">Mototaxi - TAXIA CIMCO</h1>
      <p class="text-sm text-gray-400">Accede con tu cuenta de conductor</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <input id="email" type="email" placeholder="conductor@ejemplo.com" required
             class="w-full p-3 rounded bg-slate-700 border border-slate-600" />
      <input id="password" type="password" placeholder="Contraseña" required
             class="w-full p-3 rounded bg-slate-700 border border-slate-600" />
      <button type="submit" class="w-full py-3 rounded bg-gradient-to-r from-fuchsia-600 to-cyan-400 font-bold text-white">Iniciar sesión</button>
    </form>

    <p id="status" class="text-center text-sm mt-4 text-gray-400"></p>
  </div>

  <script type="module" src="./js/mototaxi-login.js"></script>
<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
