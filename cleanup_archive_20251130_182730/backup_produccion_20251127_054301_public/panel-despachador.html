<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Despacho - TAXIA CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-neon-cyan { color: #00F0FF; }
        .bg-gradient-to-r-neon { background-image: linear-gradient(to right, #B300F2, #00F0FF); }
        .btn-neon-gradient {
            background-image: linear-gradient(to right, #B300F2, #00F0FF);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            box-shadow: 0 4px 15px -5px #B300F2;
            color: white;
        }
        .btn-neon-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px -5px #00F0FF;
        }
        .tab-active {
            border-bottom: 3px solid #00F0FF;
            color: #00F0FF;
            font-weight: 700;
        }
        .viajes-container { max-height: 60vh; overflow-y: auto; scroll-behavior: smooth; }
    </style>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>

</head>
<body class="bg-slate-900 min-h-screen text-gray-200">

    <!-- Message Box (Alert replacement) -->
    <div id="messageBox" class="fixed top-4 right-4 w-64 z-[100] hidden">
        <div id="messageText" class="p-3 rounded-lg shadow-xl text-sm font-semibold text-white"></div>
    </div>

    <header class="bg-slate-800 shadow-lg p-4 flex justify-between items-center fixed top-0 w-full z-50">
        <a href="#" class="flex items-center space-x-2">
            <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r-neon">
                TAXIA CIMCO - Panel de Despacho
            </h1>
        </a>
        <div class="flex items-center space-x-4">
            <span class="text-sm text-gray-400 hidden sm:inline-block">Despachador: <strong id="userEmail">Cargando...</strong></span>
            <button id="logoutBtn" class="bg-red-600 text-white font-semibold py-2 px-3 rounded-lg hover:bg-red-700 transition">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <main class="pt-24 pb-8 px-4 md:px-8 flex justify-center">
        <div class="bg-slate-800 shadow-xl rounded-xl p-6 w-full max-w-5xl space-y-6 border border-slate-700">

            <h2 class="text-3xl font-bold text-white text-center pb-3">
                <i class="fas fa-route mr-2 text-neon-cyan"></i> GestiÃ³n de Solicitudes Intermunicipales
            </h2>
            <p id="despachador-info" class="text-center text-sm text-gray-400">Panel de control de trÃ¡fico y asignaciÃ³n en tiempo real.</p>
            
            <!-- Selector de Ciudad y Botón de Simulación -->
            <div class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-6 mb-4 p-3 bg-slate-700/30 rounded-lg">
                <div class="flex items-center space-x-4">
                    <label for="cityFilter" class="text-gray-300 font-semibold text-sm sm:text-base"><i class="fas fa-city text-neon-cyan mr-2"></i> Filtrar por Ciudad de Origen:</label>
                    <select id="cityFilter" onchange="changeCityFilter(this.value)" class="bg-slate-700 text-white p-2 rounded-lg border border-slate-600 focus:ring-neon-cyan focus:border-neon-cyan">
                        <option value="Bogota">BogotÃ¡</option>
                        <option value="Medellin">MedellÃ­n</option>
                        <option value="Cali">Cali</option>
                        <option value="Barranquilla">Barranquilla</option>
                        <option value="Todos">Todas las Ciudades (Ineficiente)</option>
                    </select>
                </div>
                <!-- Botón de Simulación -->
                <button id="simulateBtn" onclick="simulateNewTrip()" class="btn-neon-gradient py-2 px-4 rounded-md font-bold text-sm w-full sm:w-auto">
                    <i class="fas fa-plus-circle mr-1"></i> Simular Solicitud (BogotÃ¡)
                </button>
            </div>

            <!-- Pestañas de Navegación -->
            <div class="flex border-b border-slate-700 overflow-x-auto whitespace-nowrap">
                <button id="tabPendientes" data-tab="pendientes" class="p-3 text-lg text-gray-400 hover:text-white transition tab-active">
                    <i class="fas fa-clock mr-2"></i> Solicitudes Pendientes
                </button>
                <button id="tabEnDespacho" data-tab="en_despacho" class="p-3 text-lg text-gray-400 hover:text-white transition">
                    <i class="fas fa-car-alt mr-2"></i> Mis Asignaciones (En Despacho)
                </button>
                <button id="tabEnCurso" data-tab="en_curso" class="p-3 text-lg text-gray-400 hover:text-white transition">
                    <i class="fas fa-list-check mr-2"></i> Viajes en Curso y Finalizados
                </button>
            </div>

            <!-- Contenedores de Listas -->
            <div id="list-container-pendientes" class="viajes-container space-y-4 p-4 rounded-lg bg-slate-700/50">
                <p class="statusMessage text-gray-400 italic text-center">Cargando solicitudes pendientes...</p>
            </div>

            <div id="list-container-en_despacho" class="viajes-container space-y-4 p-4 rounded-lg bg-slate-700/50 hidden">
                <p class="statusMessage text-gray-400 italic text-center">Cargando viajes en proceso de asignaciÃ³n...</p>
            </div>
            
            <div id="list-container-en_curso" class="viajes-container space-y-4 p-4 rounded-lg bg-slate-700/50 hidden">
                <p class="statusMessage text-gray-400 italic text-center">Cargando viajes en curso...</p>
            </div>

        </div>
    </main>

    <script type="module">

        // --- ConfiguraciÃ³n y AutenticaciÃ³n de Firebase ---
        setLogLevel('debug'); 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const VIAJES_COLLECTION = `artifacts/${appId}/public/data/viajes`; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const userEmailSpan = document.getElementById("userEmail");
        const logoutBtn = document.getElementById("logoutBtn");
        
        const tabPendientes = document.getElementById("tabPendientes");
        const tabEnDespacho = document.getElementById("tabEnDespacho");
        const tabEnCurso = document.getElementById("tabEnCurso");
        const listPendientes = document.getElementById("list-container-pendientes");
        const listEnDespacho = document.getElementById("list-container-en_despacho");
        const listEnCurso = document.getElementById("list-container-en_curso");
        const cityFilterSelect = document.getElementById("cityFilter");
        
        let currentDespachadorId = null;
        let unsubscribeViajes = null;
        let activeTab = 'pendientes'; 
        // Estado de filtro inicial
        let currentCityFilter = cityFilterSelect.value; 

        // --- Utilidades ---
        window.showMessage = function(message, type = 'success') {
            const messageBox = document.getElementById("messageBox");
            const messageText = document.getElementById("messageText");
            
            messageText.textContent = message;
            messageText.className = 'p-3 rounded-lg shadow-xl text-sm font-semibold text-white'; // Reset classes
            
            if (type === 'error') {
                messageText.classList.add("bg-red-600");
            } else if (type === 'warning') {
                messageText.classList.add("bg-yellow-600");
            } else {
                messageText.classList.add("bg-green-600");
            }
            
            messageBox.classList.remove("hidden");
            
            setTimeout(() => {
                messageBox.classList.add("hidden");
            }, 5000);
        }

        const formatCOP = (valor) =>
            valor.toLocaleString("es-CO", { style: "currency", currency: "COP", minimumFractionDigits: 0 });

        // --- Lógica de Filtrado ---
        window.changeCityFilter = function(newCity) {
            currentCityFilter = newCity;
            showMessage(`Cambiando filtro a ${newCity}...`, 'warning');
            escucharViajes(); // Reiniciar la escucha con el nuevo filtro
        }

        // --- Lógica de Simulación de Viaje ---
        window.simulateNewTrip = async function() {
            if (!currentDespachadorId) {
                showMessage("Debe iniciar sesiÃ³n para simular viajes.", 'error');
                return;
            }

            const mockData = [
                { origen: "Centro Andino, Bogotá", destino: "Terminal del Sur, Cali", ciudadOrigen: "Bogota", tarifaEstimada: 120000, pasajeroId: `USER_${Math.floor(Math.random() * 9999)}` },
                { origen: "Aeropuerto El Dorado, Bogotá", destino: "Pueblo de Guatavita", ciudadOrigen: "Bogota", tarifaEstimada: 85000, pasajeroId: `USER_${Math.floor(Math.random() * 9999)}` },
                { origen: "El Poblado, Medellín", destino: "Río Negro", ciudadOrigen: "Medellin", tarifaEstimada: 60000, pasajeroId: `USER_${Math.floor(Math.random() * 9999)}` },
                { origen: "Zona Rosa, Barranquilla", destino: "Cartagena (Bocagrande)", ciudadOrigen: "Barranquilla", tarifaEstimada: 200000, pasajeroId: `USER_${Math.floor(Math.random() * 9999)}` },
            ];

            // Siempre usaremos el primer mock (Bogotá) para que aparezca al inicio
            const tripIndex = Math.floor(Math.random() * 2); // 0 o 1 (Bogotá)

            const newTrip = {
                ...mockData[tripIndex],
                estado: 'pendiente',
                timestampSolicitud: serverTimestamp(),
                historial: [{ 
                    estado: 'pendiente', 
                    timestamp: serverTimestamp() 
                }]
            };

            try {
                await addDoc(collection(db, VIAJES_COLLECTION), newTrip);
                showMessage(`Nueva solicitud de viaje a ${newTrip.ciudadOrigen} creada con éxito.`, 'success');
                setActiveTab('pendientes');
            } catch (error) {
                console.error("Error al simular el viaje:", error);
                showMessage(`Fallo al simular el viaje: ${error.message}`, 'error');
            }
        }


        // --- Lógica de Despacho (Acciones) ---

        // 1. Tomar Viaje (Mueve de Pendiente a En Despacho)
        window.tomarViaje = async function(viajeId) {
            if (!currentDespachadorId) {
                showMessage("Debe iniciar sesiÃ³n para tomar viajes.", 'error');
                return;
            }

            try {
                const viajeRef = doc(db, VIAJES_COLLECTION, viajeId);
                
                await runTransaction(db, async (transaction) => {
                    const docSnap = await transaction.get(viajeRef);

                    if (!docSnap.exists() || docSnap.data().estado !== 'pendiente') {
                        throw new Error("El viaje ya fue tomado o asignado.");
                    }

                    transaction.update(viajeRef, {
                        estado: 'en_despacho', 
                        timestampDespacho: serverTimestamp(),
                        despachadorId: currentDespachadorId,
                        historial: arrayUnion({ 
                            estado: 'en_despacho', 
                            despachador: currentDespachadorId,
                            timestamp: serverTimestamp()
                        })
                    });
                });
                
                showMessage(`Viaje ${viajeId.substring(0, 8)} tomado. Procede a asignar conductor en la pestaÃ±a 'Mis Asignaciones'.`, 'success');
                setActiveTab('en_despacho');

            } catch (error) {
                console.error("Error al tomar el viaje:", error);
                showMessage(`Fallo al tomar: ${error.message}`, 'error');
            }
        }

        // 2. Finalizar AsignaciÃ³n (Mueve de En Despacho a Asignado)
        window.finalizarAsignacion = async function(viajeId) {
            if (!currentDespachadorId) {
                showMessage("Debe iniciar sesiÃ³n.", 'error');
                return;
            }

            try {
                const viajeRef = doc(db, VIAJES_COLLECTION, viajeId);
                
                // Simular la asignaciÃ³n a un conductor
                const conductorMockId = 'CONDUCTOR_' + Math.floor(Math.random() * 1000); 

                await runTransaction(db, async (transaction) => {
                    const docSnap = await transaction.get(viajeRef);

                    if (!docSnap.exists() || docSnap.data().estado !== 'en_despacho' || docSnap.data().despachadorId !== currentDespachadorId) {
                        throw new Error("El viaje no estÃ¡ en tu lista de asignaciÃ³n activa.");
                    }

                    transaction.update(viajeRef, {
                        estado: 'asignado', 
                        conductorId: conductorMockId,
                        timestampAsignacion: serverTimestamp(),
                        historial: arrayUnion({ 
                            estado: 'asignado', 
                            conductor: conductorMockId,
                            timestamp: serverTimestamp()
                        })
                    });
                });
                
                showMessage(`Viaje ${viajeId.substring(0, 8)} ASIGNADO al conductor ${conductorMockId}. Ahora en seguimiento.`, 'success');
                setActiveTab('en_curso'); 

            } catch (error) {
                console.error("Error al finalizar la asignaciÃ³n:", error);
                showMessage(`Fallo al finalizar: ${error.message}`, 'error');
            }
        }
        
        // --- GestiÃ³n de Insignias de Estado ---
        function getStatusBadge(estado, conductorId) {
            let colorClass, text;
            
            switch (estado) {
                case 'pendiente':
                    colorClass = 'text-cyan-300 bg-cyan-900/50';
                    text = 'Pendiente';
                    break;
                case 'en_despacho':
                    colorClass = 'text-yellow-300 bg-yellow-900/50';
                    text = 'En Despacho';
                    break;
                case 'asignado':
                    colorClass = 'text-indigo-300 bg-indigo-900/50';
                    text = `Asignado a ${conductorId.substring(0, 8)}`;
                    break;
                case 'en_ruta':
                    colorClass = 'text-green-300 bg-green-900/50';
                    text = `En Ruta con ${conductorId.substring(0, 8)}`;
                    break;
                case 'finalizado':
                    colorClass = 'text-gray-300 bg-gray-600/50';
                    text = 'Finalizado';
                    break;
                default:
                    colorClass = 'text-red-300 bg-red-900/50';
                    text = 'Desconocido';
            }
            return `<span class="text-sm font-semibold ${colorClass} p-1 px-2 rounded-full">${text}</span>`;
        }

        // --- Renderizado de Viajes ---

        function renderViajes(viajes, container, panelType) {
            container.innerHTML = '';
            const isEnCurso = panelType === 'en_curso';
            const isEnDespacho = panelType === 'en_despacho';

            if (viajes.length === 0) {
                let message;
                if (isEnCurso) {
                     message = 'No hay viajes en curso o finalizados para esta ciudad.';
                } else if (isEnDespacho) {
                    message = 'No tienes viajes en proceso de asignaciÃ³n activa para esta ciudad.';
                } else {
                    message = 'No hay solicitudes de viaje pendientes para esta ciudad. Ãrea despejada.';
                }
                container.innerHTML = `<p class="text-gray-400 italic text-center p-4">${message}</p>`;
                return;
            }

            viajes.sort((a, b) => (a.timestampSolicitud?.toDate() || new Date(0)) - (b.timestampSolicitud?.toDate() || new Date(0)));

            viajes.forEach(viaje => {
                const fechaSolicitud = viaje.timestampSolicitud?.toDate()?.toLocaleString('es-CO') || 'Fecha desconocida';
                
                let buttonHtml = '';
                let statusBadge = getStatusBadge(viaje.estado, viaje.conductorId || 'N/A');
                let borderColor = 'border-neon-cyan';

                if (panelType === 'en_despacho') {
                    buttonHtml = `
                        <button onclick="finalizarAsignacion('${viaje.id}')" class="py-2 px-4 rounded-md font-bold text-sm bg-yellow-600 hover:bg-yellow-700 text-white transition">
                            <i class="fas fa-check mr-1"></i> Finalizar AsignaciÃ³n (Mock)
                        </button>`;
                    borderColor = 'border-yellow-500';

                } else if (panelType === 'pendientes') {
                    buttonHtml = `
                        <button onclick="tomarViaje('${viaje.id}')" class="btn-neon-gradient py-2 px-4 rounded-md font-bold text-sm">
                            <i class="fas fa-hands-helping mr-1"></i> Tomar para Asignar
                        </button>`;
                    borderColor = 'border-purple-500';
                }
                if (isEnCurso) {
                     borderColor = ['asignado', 'en_ruta'].includes(viaje.estado) ? 'border-green-500' : 'border-gray-500';
                }


                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl shadow-lg flex flex-col md:flex-row justify-between items-start md:items-center space-y-3 md:space-y-0 border-l-4 ${borderColor}">
                        
                        <div class="flex-grow space-y-1">
                            <div class="flex items-center space-x-3">
                                <p class="text-base text-gray-400 font-medium">#ID: ${viaje.id.substring(0, 8)}...</p>
                                ${statusBadge}
                            </div>
                            <p class="text-lg font-bold text-white"><i class="fas fa-map-marker-alt text-red-500 mr-2"></i> Origen: ${viaje.origen || 'N/A'} (Ciudad: ${viaje.ciudadOrigen || 'N/A'})</p>
                            <p class="text-lg font-bold text-white"><i class="fas fa-bullseye text-green-500 mr-2"></i> Destino: ${viaje.destino || 'N/A'}</p>
                            ${(isEnCurso || isEnDespacho) && viaje.conductorId ? `<p class="text-sm text-gray-300"><i class="fas fa-taxi mr-2 text-indigo-400"></i> Conductor ID: ${viaje.conductorId.substring(0, 10)}</p>` : ''}
                            <p class="text-sm text-gray-400">Solicitado por: ${viaje.pasajeroId.substring(0, 8) || 'Invitado'}</p>
                            <p class="text-xs text-gray-500 mt-1">Hora: ${fechaSolicitud}</p>
                        </div>

                        <div class="flex flex-col items-end space-y-3">
                            <span class="text-2xl font-extrabold text-neon-cyan">${formatCOP(viaje.tarifaEstimada || 0)}</span>
                            ${buttonHtml}
                        </div>
                    </div>
                `;
            });
        }


        // --- Lógica de Escucha de Viajes (Ahora con Filtro de Ciudad) ---
        function escucharViajes() {
            if (unsubscribeViajes) unsubscribeViajes();
            if (!currentDespachadorId) return;

            const viajesRef = collection(db, VIAJES_COLLECTION);
            
            // Si se selecciona "Todas las Ciudades", se omite el filtro de ciudad, 
            // pero esto es menos eficiente y puede necesitar Ãndices compuestos
            let q;
            if (currentCityFilter === 'Todos') {
                 // Advertencia: Esta consulta puede ser menos eficiente si la colecciÃ³n es muy grande
                 // y no es posible usar mÃ¡s de un filtro 'in' en una query de Firestore
                 q = query(viajesRef, where("estado", "in", ["pendiente", "en_despacho", "asignado", "en_ruta", "finalizado"]));
            } else {
                 // Consulta filtrada por Ciudad de Origen Y estados
                 q = query(
                    viajesRef, 
                    where("ciudadOrigen", "==", currentCityFilter), // FILTRO DE CIUDAD APLICADO AQUÃ 
                    where("estado", "in", ["pendiente", "en_despacho", "asignado", "en_ruta", "finalizado"])
                ); 
            }
            

            unsubscribeViajes = onSnapshot(q, (snapshot) => {
                const viajesPendientes = [];
                const misViajesEnDespacho = [];
                const viajesEnCurso = []; 

                if (snapshot.empty) {
                    renderViajes(viajesPendientes, listPendientes, 'pendiente');
                    renderViajes(misViajesEnDespacho, listEnDespacho, 'en_despacho');
                    renderViajes(viajesEnCurso, listEnCurso, 'en_curso');
                    return;
                }

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const viaje = { id: docSnap.id, ...data };

                    // Filtro Local: Solo incluimos si el documento tiene la propiedad ciudadOrigen (para evitar errores)
                    if (viaje.ciudadOrigen || currentCityFilter === 'Todos') { 
                        if (viaje.estado === 'pendiente') {
                            viajesPendientes.push(viaje);
                        } else if (viaje.estado === 'en_despacho' && viaje.despachadorId === currentDespachadorId) {
                            misViajesEnDespacho.push(viaje);
                        } else if (['asignado', 'en_ruta', 'finalizado'].includes(viaje.estado)) {
                            viajesEnCurso.push(viaje); 
                        }
                    }
                });

                renderViajes(viajesPendientes, listPendientes, 'pendientes');
                renderViajes(misViajesEnDespacho, listEnDespacho, 'en_despacho');
                renderViajes(viajesEnCurso, listEnCurso, 'en_curso');

            }, (error) => {
                console.error("Error escuchando viajes con filtro:", error);
                const errorMessage = `<p class="text-red-500 italic text-center p-4">Error al cargar solicitudes. Verifique la consola por posibles errores de Ãndice: ${error.message}</p>`;
                listPendientes.innerHTML = errorMessage;
                listEnDespacho.innerHTML = errorMessage;
                listEnCurso.innerHTML = errorMessage;
            });
        }

        // --- Lógica de Pestañas ---
        function setActiveTab(tabName) {
            activeTab = tabName;

            tabPendientes.classList.remove('tab-active');
            tabEnDespacho.classList.remove('tab-active');
            tabEnCurso.classList.remove('tab-active');
            listPendientes.classList.add('hidden');
            listEnDespacho.classList.add('hidden');
            listEnCurso.classList.add('hidden');

            if (tabName === 'pendientes') {
                tabPendientes.classList.add('tab-active');
                listPendientes.classList.remove('hidden');
            } else if (tabName === 'en_despacho') {
                tabEnDespacho.classList.add('tab-active');
                listEnDespacho.classList.remove('hidden');
            } else if (tabName === 'en_curso') { 
                tabEnCurso.classList.add('tab-active');
                listEnCurso.classList.remove('hidden');
            }
        }

        tabPendientes.addEventListener('click', () => setActiveTab('pendientes'));
        tabEnDespacho.addEventListener('click', () => setActiveTab('en_despacho'));
        tabEnCurso.addEventListener('click', () => setActiveTab('en_curso'));


        // --- InicializaciÃ³n y AutenticaciÃ³n ---
        async function initAuth() {
            try {
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de autenticaciÃ³n inicial:", error);
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentDespachadorId = user.uid;
                    userEmailSpan.textContent = user.email || user.uid.substring(0, 10);
                    escucharViajes(); // Iniciar la escucha con el filtro de ciudad por defecto
                } else {
                    userEmailSpan.textContent = "Desconectado";
                    const disconnectedMessage = `<p class="text-red-500 italic text-center p-4">SesiÃ³n no vÃ¡lida. Por favor, inicie sesiÃ³n.</p>`;
                    listPendientes.innerHTML = disconnectedMessage;
                    listEnDespacho.innerHTML = disconnectedMessage;
                    listEnCurso.innerHTML = disconnectedMessage;
                }
            });
        }

        logoutBtn.addEventListener("click", async () => {
            if (unsubscribeViajes) unsubscribeViajes();
            try {
                await signOut(auth);
                showMessage("SesiÃ³n cerrada.", 'warning');
            } catch (error) {
                console.error("Error al cerrar sesiÃ³n:", error);
                showMessage("Error al cerrar sesiÃ³n.", 'error');
            }
        });

        initAuth();
    </script>
<script src="/despachador/js/firebase/firebase-loader.js"></script>
</body>
</html>
