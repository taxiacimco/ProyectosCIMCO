<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Historial Corporativo - TAXIA CIMCO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- APP_ENV + mode-manager (insertado automáticamente) -->
<script>
  window.APP_ENV = "prod";
</script>

</head>

<body class="bg-slate-900 text-gray-200">
  <header class="p-4 bg-slate-800 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold text-cyan-400">📊 TAXIA CIMCO - Historial Corporativo</h1>
    <div class="flex gap-2">
      <button id="exportPDF" class="bg-red-600 px-3 py-2 rounded hover:bg-red-700">Exportar PDF</button>
      <button id="exportXLSX" class="bg-green-600 px-3 py-2 rounded hover:bg-green-700">Exportar Excel</button>
    </div>
  </header>

  <main class="p-6 space-y-6">
    <section class="bg-slate-800 p-4 rounded-xl">
      <h2 class="font-semibold text-cyan-400 mb-2">🔎 Buscar viajes</h2>
      <input id="searchInput" type="text" placeholder="Buscar por destino o estado..."
        class="w-full p-2 rounded bg-slate-700 text-white placeholder-gray-400">
    </section>

    <section class="bg-slate-800 p-4 rounded-xl">
      <h2 class="font-semibold text-green-400 mb-3">🧾 Historial de viajes</h2>
      <table class="min-w-full text-sm">
        <thead>
          <tr class="text-left border-b border-gray-600">
            <th class="p-2">Fecha</th>
            <th class="p-2">Origen</th>
            <th class="p-2">Destino</th>
            <th class="p-2">Estado</th>
          </tr>
        </thead>
        <tbody id="viajesTable" class="text-gray-300"></tbody>
      </table>
    </section>
  </main>

  
  <script type="module" src="./js/corporativo-historial.js"></script>
<script src="/pasajero/js/firebase/firebase-loader.js"></script>
</body>
</html>
