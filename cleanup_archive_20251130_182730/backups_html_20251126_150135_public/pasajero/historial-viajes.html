<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial de Viajes - TAXIA CIMCO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-gray-100 min-h-screen p-6">
  <h1 class="text-2xl font-bold text-center text-cyan-400 mb-4">🗺️ Historial de Viajes</h1>
  <p class="text-center mb-6">Bienvenido, <span id="userEmail" class="text-green-400"></span></p>

  <div id="viajesList" class="space-y-4 max-w-lg mx-auto"></div>

  <div class="text-center mt-8">
    <button onclick="window.location.href='panel-pasajero.html'" class="bg-slate-700 px-4 py-2 rounded-lg hover:bg-slate-600 transition">⬅️ Volver</button>
    <button id="logoutBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition ml-2">Cerrar sesión</button>
  </div>

  <script type="module">
    import { getAuth, onAuthStateChanged, signOut } 
    import { getFirestore, collection, query, where, getDocs } 
    import { app } from "./js/firebase-config-pasajero.js";

    const auth = getAuth(app);
    const db = getFirestore(app);

    const viajesList = document.getElementById("viajesList");
    const userEmailEl = document.getElementById("userEmail");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        userEmailEl.textContent = user.email;
        const q = query(collection(db, "viajes"), where("pasajeroId", "==", user.uid));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          viajesList.innerHTML = "<p class='text-center text-gray-400'>No tienes viajes registrados 🚖</p>";
          return;
        }

        snapshot.forEach((docu) => {
          const v = docu.data();
          const card = document.createElement("div");
          card.className = "bg-slate-800 p-4 rounded-lg shadow";
          card.innerHTML = `
            <p><b>📍 Origen:</b> ${v.origen}</p>
            <p><b>🏁 Destino:</b> ${v.destino}</p>
            <p><b>📅 Fecha:</b> ${v.fecha || "Sin fecha"}</p>
            <p><b>🔄 Estado:</b> ${v.estado || "Pendiente"}</p>
          `;
          viajesList.appendChild(card);
        });
      } else {
        window.location.href = "login-pasajero.html";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login-pasajero.html";
    });
  </script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
