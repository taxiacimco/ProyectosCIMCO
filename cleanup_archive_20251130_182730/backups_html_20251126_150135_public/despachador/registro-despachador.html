<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Despachador - TAXIA CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                       z-index: 1000; padding: .75rem 1.5rem; border-radius: .5rem; opacity: 0;
                       transition: opacity .3s ease-in-out; }
        .message-box.show { opacity: 1; }
    </style>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center p-4">

    <div id="messageBox" class="message-box hidden"></div>

    <div class="bg-white shadow-2xl rounded-xl p-8 w-full md:max-w-md space-y-6">

        <h1 class="text-3xl font-bold text-center text-purple-700">Registro Despachador</h1>
        <p class="text-center text-gray-600">Crea una cuenta para acceder al panel de gestión de viajes.</p>

        <form id="registroForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@taxiacimco.com"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres" minlength="6"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500">
            </div>
             <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" required placeholder="Repetir contraseña" minlength="6"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500">
            </div>

            <button type="submit" id="registroBtn"
                    class="w-full bg-green-600 text-white font-semibold py-2 rounded-lg hover:bg-green-700 transition duration-150 ease-in-out">
                <i class="fas fa-user-plus mr-2"></i> Registrar Cuenta
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-500 mt-4">
            ¿Ya tienes cuenta? <a href="login-despachador.html" class="text-purple-600 hover:text-purple-800 font-medium">Inicia Sesión aquí</a>
        </p>

    </div>

    <script type="module">
        // Importa tu configuración de Firebase
        // AJUSTA LA RUTA DE ACUERDO A DÓNDE ESTÉ TU ARCHIVO firebase-config-despachador.js
        import { auth, db } from "../../../js/firebase-config-despachador.js"; 

        // --- Utils ---
        const showMessage = (msg, type = "info") => {
            const box = document.getElementById("messageBox");
            box.textContent = msg;
            box.className = `message-box show ${
                type === "success" ? "bg-green-200 text-green-800" :
                type === "error" ? "bg-red-200 text-red-800" :
                "bg-blue-200 text-blue-800"
            }`;
            setTimeout(() => box.classList.remove("show"), 3000);
        };

        // --- Lógica de Registro ---
        const registroForm = document.getElementById('registroForm');
        
        registroForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registroBtn = document.getElementById('registroBtn');
            
            if (password !== confirmPassword) {
                showMessage("Las contraseñas no coinciden.", "error");
                return;
            }

            registroBtn.disabled = true;
            registroBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Registrando...';

            try {
                // 1. Crear la cuenta en Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Crear un documento en Firestore para el perfil del despachador
                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    role: "despachador",
                    registrationDate: new Date(),
                    status: "active",
                    // Puedes añadir mÃ¡s campos si los solicitas en el formulario (ej: name)
                });

                showMessage("Registro exitoso. Serás redirigido al inicio de sesión.", "success");
                
                // Redirigir al login para que inicie sesiÃ³n
                setTimeout(() => {
                    window.location.href = "login-despachador.html";
                }, 1500);
                
            } catch (error) {
                let errorMessage = "Ocurrió un error al registrar.";
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = "Este correo ya está registrado. Intenta con otro o inicia sesión.";
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = "El formato del correo es inválido.";
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = "La contraseña debe tener al menos 6 caracteres.";
                }
                showMessage(errorMessage, "error");
                console.error(error);
                registroBtn.disabled = false;
                registroBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> Registrar Cuenta';
            }
        });
    </script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
