<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Despachador Intermunicipal - TAXIA CIMCO</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    #map { height: 80vh; border-radius: 1rem; box-shadow: 0 0 10px rgba(0,255,255,0.3); }
    .btn-neon {
      background: linear-gradient(to right, #B300F2, #00F0FF);
      color: white; padding: 10px 20px; border-radius: 10px;
      font-weight: bold; transition: all 0.2s ease-in-out;
    }
    .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 15px #00F0FF; }
  </style>
</head>

<body class="bg-slate-900 text-gray-200">

  <header class="bg-slate-800 shadow-lg p-4 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">
      TAXIA CIMCO - Mapa Intermunicipal
    </h1>
    <button id="logoutBtn" class="btn-neon"><i class="fas fa-sign-out-alt mr-1"></i>Salir</button>
  </header>

  <main class="p-6">
    <h2 class="text-center text-xl font-semibold mb-4">Conductores Intermunicipales en Tiempo Real</h2>
    <div id="map"></div>
  </main>

  <script type="module" src="./js/despachador-mapa.js"></script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
