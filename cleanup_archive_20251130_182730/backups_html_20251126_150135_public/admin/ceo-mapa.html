<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- ? TailwindCSS -->

  <!-- ? Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      background-color: #0f172a;

  </style>
  <link rel="stylesheet" href="./css/output.css" />`r`n</head>

<body>
  <!-- Encabezado -->
  <header class="p-4 bg-slate-800 flex justify-between items-center shadow-md">
    <h1 class="text-lg md:text-xl font-bold text-cyan-400">
      ??? Mapa Global - TAXIA CIMCO (CEO)
    </h1>
    <div class="flex gap-3 items-center">
      <button id="nequiBtn" class="bg-green-500 px-3 py-2 rounded-lg text-white hover:bg-green-600">
        ?? Pagar con Nequi
      </button>
      <button id="logoutBtn" class="bg-red-600 px-3 py-2 rounded-lg text-white hover:bg-red-700">
        Cerrar sesi�n
      </button>
    </div>
  </header>

  <!-- Contenedor principal -->
  <main class="p-4">
    <div id="map" class="w-full"></div>
  </main>

  <!-- ========================================================= -->
  <script type="module">
    import { auth, db } from "/js/firebase-config-ceo.js";

    // ?? Inicializar mapa
    const map = L.map("map").setView([9.56, -73.62], 13);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const markers = {};

    const addMarker = (id, role, lat, lng, nombre = "Sin nombre") => {
      const color =
        role === "mototaxi" ? "red" :
        role === "motoparrillero" ? "orange" :
        role === "motocarga" ? "green" :
        role === "interconductor" ? "blue" :
        role === "pasajero" ? "yellow" :
        "gray";

      const icon = L.divIcon({
        html: `<div style="background:${color}; width:14px; height:14px; border-radius:50%; border:2px solid white;"></div>`,
        className: ""
      });

      if (markers[id]) {
        markers[id].setLatLng([lat, lng]);
      } else {
        markers[id] = L.marker([lat, lng], { icon })
          .addTo(map)
          .bindPopup(`
            <strong>${nombre}</strong><br>
            Rol: ${role.toUpperCase()}<br>
            ?? ${lat.toFixed(4)}, ${lng.toFixed(4)}
          `);
      }
    };

    // ?? Escuchar colecciones de Firestore para todos los roles
    const roles = [
      { coleccion: "mototaxis", tipo: "mototaxi" },
      { coleccion: "motoparrilleros", tipo: "motoparrillero" },
      { coleccion: "motocarga", tipo: "motocarga" },
      { coleccion: "conductores_inter", tipo: "interconductor" },
      { coleccion: "pasajeros", tipo: "pasajero" },
    ];

    roles.forEach(({ coleccion, tipo }) => {
      const ref = collection(db, coleccion);
      onSnapshot(ref, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          const data = change.doc.data();
          if (data.lat && data.lng) {
            addMarker(change.doc.id, tipo, data.lat, data.lng, data.nombre || tipo);
          }
        });
      });
    });

    // ?? Bot�n Cerrar Sesi�n
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "logout-ceo.html";
    });

    // ?? Bot�n Nequi (abrir app o n�mero)
    document.getElementById("nequiBtn").addEventListener("click", () => {
      const numero = "3104180514";
      alert(`Para saldar tus deudas, env�a el pago al Nequi ${numero}`);
      window.open(`https://wa.me/57${numero}?text=Hola,%20ya%20realic�%20mi%20pago%20por%20Nequi%20para%20CIMCO.`, "_blank");
    });
  </script>
  <script type="module" src="/js/realtime-sync.js"></script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
