<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerrando sesión - TAXIA CIMCO</title>

  <!-- Tailwind -->

  <!-- Fuentes e iconos -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #00F0FF22);
      background-size: 300% 300%;
      animation: bgMove 6s ease infinite;
    }
    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .fade-in {
      animation: fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="stylesheet" href="./css/output.css" />`r`n</head>

<body class="flex flex-col items-center justify-center min-h-screen text-gray-100 text-center">

  <div class="fade-in bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full">
    <i class="fas fa-right-from-bracket text-6xl text-cyan-400 mb-6"></i>
    <h1 class="text-3xl font-extrabold text-white mb-2">Cerrando Sesión...</h1>
    <p class="text-gray-400 mb-4">
      Gracias por usar el panel de administración de 
      <span class="text-cyan-400 font-semibold">TAXIA CIMCO</span>.
    </p>
    <div class="mt-6">
      <div class="w-48 mx-auto h-2 bg-slate-700 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-2 bg-gradient-to-r from-fuchsia-500 to-cyan-400 animate-pulse"></div>
      </div>
      <p id="countdown" class="text-gray-400 text-sm mt-3">Redirigiendo en 3 segundos...</p>
    </div>
  </div>

  <!-- Script modular -->
  <script type="module" src="../js/logout-ceo.js"></script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
