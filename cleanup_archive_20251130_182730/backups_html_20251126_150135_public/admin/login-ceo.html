<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login CEO - TAXIA CIMCO</title>

  <!-- ✅ Tailwind (solo desarrollo) -->

  <!-- ✅ Fuentes e iconos -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e2e8f0;
    }
    .fade-in {
      animation: fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <!-- 🚩 CORRECCIÓN CRÍTICA: Cambiada la ruta de CSS de "./css/output.css" a "../css/output.css" 
         para subir un nivel de /admin/ a la raíz. -->
  <link rel="stylesheet" href="../css/output.css" />
  </head>

<body class="flex items-center justify-center min-h-screen bg-slate-900 text-gray-200">

  <div class="fade-in bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">

    <!-- 🔘 Switch modo Piloto/Producción -->
    <div class="flex justify-end mb-4">
      <label class="flex items-center gap-2 cursor-pointer">
        <span id="modoTexto" class="text-cyan-400 font-bold text-sm">PRODUCCIÓN</span>
        <input type="checkbox" id="switchModo" class="hidden">
        <div class="relative w-12 h-6 bg-gray-600 rounded-full">
          <div id="bolitaModo" class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-all duration-300"></div>
        </div>
      </label>
    </div>

    <!-- Encabezado -->
    <div class="text-center mb-8">
      <!-- 🚩 CORRECCIÓN CRÍTICA: Eliminado el guion extra en el nombre del archivo: logo-taxiacimco.png -->
      <img src="/admin/assets/logo-taxiacimco.png" alt="Logo TAXIA CIMCO" class="mx-auto w-20 h-20 mb-3 drop-shadow-lg">
      <h1 class="text-3xl font-extrabold text-white mt-2">Panel CEO</h1>
      <p class="text-gray-400 text-sm mt-1">Acceso exclusivo para administradores</p>
    </div>

    <!-- Formulario -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-semibold mb-1">Correo electrónico</label>
        <input type="email" id="email" placeholder="ceo@taxiacimco.com"
          class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400"
          required>
        </div>

        <div>
        <label for="password" class="block text-sm font-semibold mb-1">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"
          class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400"
          required>
        </div>

        <button id="btnLogin" type="submit"
          class="w-full py-3 rounded-lg font-bold text-white bg-gradient-to-r from-fuchsia-600 to-cyan-400 hover:scale-105 transition transform shadow-lg">
          Iniciar Sesión
        </button>
      </form>

    <!-- Mensajes dinámicos -->
    <p id="login-status" class="text-sm text-center mt-4 hidden"></p>

    <div class="mt-6 text-center text-xs text-gray-500">
      © 2025 TAXIA CIMCO — Centro de Control
    </div>
  </div>

  <!-- ✅ Botón rápido para cambiar de modo -->
  <button id="switchModeBtn" class="fixed top-4 right-4 bg-cyan-600 text-white px-4 py-2 rounded-lg shadow-lg hover:bg-cyan-500 transition">
    Cambiar Modo
  </button>

  <!-- ✅ Script principal -->
  <script type="module">
    import { loadFirebaseEnvironment, toggleFirebaseMode } from "./js/firebase-mode-manager.js";

    // Cargar entorno actual (piloto o producción)
    const { auth, db } = await loadFirebaseEnvironment();
    console.log("🔥 Modo activo:", localStorage.getItem("firebaseMode"));

    // Inicializar el login principal
    import("./js/login-ceo.js");

    // Manejador del botón rápido
    document.getElementById("switchModeBtn").addEventListener("click", () => {
      toggleFirebaseMode();
    });
  </script>


<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
