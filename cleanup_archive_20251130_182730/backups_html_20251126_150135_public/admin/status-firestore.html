<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📡 Estado Firestore — TAXIA CIMCO</title>

  <!-- === Estilos Neón Oscuro === -->
  <style>
    body {
      background-color: #0a0f1a;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #e0f2fe;
      text-align: center;
      margin: 0;
      padding: 40px;
      overflow-x: hidden;
    }

    h1 {
      color: #22d3ee;
      text-shadow: 0 0 10px #06b6d4;
      font-size: 1.9rem;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .status-box {
      background-color: #111827;
      border: 2px solid #06b6d4;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
      display: inline-block;
      padding: 35px 45px;
      min-width: 340px;
      transition: all 0.6s ease-in-out;
      animation: pulseNeon 3s infinite;
    }

    @keyframes pulseNeon {
      0%, 100% { box-shadow: 0 0 15px rgba(6,182,212,0.6); }
      50% { box-shadow: 0 0 25px rgba(6,182,212,1); }
    }

    .status-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }

    .status-ok {
      color: #22c55e;
      text-shadow: 0 0 15px #16a34a;
    }

    .status-error {
      color: #ef4444;
      text-shadow: 0 0 15px #dc2626;
    }

    .status-warning {
      color: #facc15;
      text-shadow: 0 0 15px #ca8a04;
    }

    .timestamp {
      color: #9ca3af;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .message {
      font-size: 1rem;
      margin-top: 10px;
      color: #93c5fd;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #475569;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .fadeIn {
      animation: fadeIn 0.8s ease-out;
    }
  </style>
</head>

<body>
  <h1>🚖 Monitoreo del Sistema Firestore — TAXIA CIMCO</h1>

  <div id="statusBox" class="status-box fadeIn">
    <div id="statusIcon" class="status-icon status-warning">🟡</div>
    <div id="statusText" class="text-lg font-semibold">Verificando conexión...</div>
    <div id="message" class="message">Cargando información del sistema...</div>
    <div id="timestamp" class="timestamp">Última revisión: —</div>
  </div>

  <div class="footer">
    Panel de Monitoreo — Sistema de Control TAXIA CIMCO<br />
    © 2025 Todos los derechos reservados.
  </div>

  <!-- === Script actualizado al servidor Express === -->
  <script>
    async function loadStatus() {
      try {
        // ✅ Ahora se obtiene desde el servidor Express (no desde ruta local)
        const response = await fetch("http://localhost:3000/logs/status.json?" + Date.now());
        const data = await response.json();

        const icon = document.getElementById("statusIcon");
        const text = document.getElementById("statusText");
        const msg = document.getElementById("message");
        const time = document.getElementById("timestamp");
        const box = document.getElementById("statusBox");

        if (data.status === "OK") {
          icon.textContent = "🟢";
          icon.className = "status-icon status-ok";
          text.textContent = "Firestore operativo";
          msg.textContent = "Todo funciona correctamente ✅";
          box.style.borderColor = "#22c55e";
          box.style.boxShadow = "0 0 25px rgba(34,197,94,0.7)";
        } else if (data.status === "ERROR") {
          icon.textContent = "🔴";
          icon.className = "status-icon status-error";
          text.textContent = "Error en Firestore";
          msg.textContent = data.message || "Se detectó una falla en la verificación ❌";
          box.style.borderColor = "#ef4444";
          box.style.boxShadow = "0 0 25px rgba(239,68,68,0.7)";
        } else {
          icon.textContent = "🟡";
          icon.className = "status-icon status-warning";
          text.textContent = "En revisión";
          msg.textContent = "El sistema está procesando información...";
          box.style.borderColor = "#facc15";
          box.style.boxShadow = "0 0 25px rgba(250,204,21,0.7)";
        }

        time.textContent = "Última revisión: " + (data.lastCheck || "—");
      } catch (error) {
        const box = document.getElementById("statusBox");
        document.getElementById("statusText").textContent = "⚠️ No se pudo leer el estado del servidor.";
        document.getElementById("message").textContent =
          "Verifica la conexión con http://localhost:3000/logs/status.json o el archivo status.json.";
        box.style.borderColor = "#facc15";
        box.style.boxShadow = "0 0 25px rgba(250,204,21,0.7)";
      }
    }

    // Ejecutar al cargar
    loadStatus();

    // Actualizar cada minuto
    setInterval(loadStatus, 60000);
  </script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
