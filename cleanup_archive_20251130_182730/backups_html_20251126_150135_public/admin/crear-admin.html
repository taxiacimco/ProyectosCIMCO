<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Crear Usuarios – Centro de Control CIMCO</title>

  <!-- TailwindCSS + Alpine.js -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { fondo: '#0f172a', panel: '#1e293b' } } }
    };
  </script>
  <link rel="stylesheet" href="./css/output.css" />`r`n</head>

<body class="bg-fondo text-gray-100 min-h-screen flex flex-col items-center justify-center">
  <div class="bg-panel p-8 rounded-2xl shadow-xl w-full max-w-lg space-y-6">
    <h1 class="text-2xl font-bold text-cyan-400 text-center">👤 Crear Usuarios (CEO)</h1>
    <p class="text-sm text-center text-gray-400">Solo accesible para el rol <strong>CEO</strong></p>

    <!-- Formulario -->
    <form id="crearForm" class="space-y-4">
      <div>
        <label class="block mb-1">Correo electrónico</label>
        <input type="email" id="email" class="w-full p-2 rounded bg-gray-800 border border-gray-700" required>
      </div>

      <div>
        <label class="block mb-1">Contraseña</label>
        <input type="password" id="password" class="w-full p-2 rounded bg-gray-800 border border-gray-700" required>
      </div>

      <div>
        <label class="block mb-1">Rol</label>
        <select id="rol" class="w-full p-2 rounded bg-gray-800 border border-gray-700" required>
          <option value="">Selecciona un rol</option>
          <option value="ceo">CEO</option>
          <option value="admin">Administrador</option>
          <option value="coordinador">Coordinador</option>
          <option value="mototaxi">Mototaxi</option>
          <option value="motoparrillero">Motoparrillero</option>
          <option value="motocarga">Motocarga</option>
          <option value="pasajero">Pasajero</option>
          <option value="despachadorinter">Despachador Inter</option>
          <option value="interconductor">Interconductor</option>
        </select>
      </div>

      <button type="submit"
        class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 rounded transition">
        ➕ Crear Usuario
      </button>
    </form>

    <div id="mensaje" class="text-center text-sm mt-3"></div>

    <button id="logoutBtn" class="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-2 rounded">
      🔒 Cerrar Sesión
    </button>
  </div>

  <!-- Scripts -->
  <script type="module" src="./js/crear-admin.js"></script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
