<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Conductores - TAXIA CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message { transition: all .3s ease; }
        .btn-primary { background-color: #10B981; } /* Verde esmeralda para login */
        .btn-primary:hover { background-color: #059669; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Bienvenido Conductor</h1>
        <h2 class="text-xl text-center text-green-600 mb-6">TAXIA CIMCO - Ingreso</h2>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Correo electrónico" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <input type="password" id="password" placeholder="Contraseña" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <button type="submit"
                class="w-full btn-primary text-white font-semibold py-3 rounded-lg shadow-lg transition">
                Ingresar
            </button>
        </form>
        <p id="msg" class="mt-4 text-center text-sm text-red-500 message hidden"></p>
        
        <p class="mt-6 text-center text-sm text-gray-500">
            ¿No tienes cuenta? <a href="registro-conductor.html" class="text-green-600 hover:text-green-700 font-semibold">Regístrate aquí</a>
        </p>
    </div>

    <script type="module">

        // --- ConfiguraciÃ³n de Firebase (Se usa __firebase_config proporcionada por el entorno) ---
        setLogLevel('debug'); 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        // ColecciÃ³n pÃºblica donde se almacena el rol del usuario
        const USUARIOS_COLLECTION = `artifacts/${appId}/public/data/usuarios`; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("loginForm");
        const msg = document.getElementById("msg");

        // FunciÃ³n de redirecciÃ³n centralizada basada en el rol
        async function redirectToPanel(uid) {
            const userDocRef = doc(db, USUARIOS_COLLECTION, uid);
            try {
                const docSnap = await getDoc(userDocRef);
                if (docSnap.exists()) {
                    const rol = docSnap.data().rol;
                    let redirectPath = "panel-conductor.html"; // Fallback general

                    // LÃ³gica de redirecciÃ³n especÃ­fica por rol
                    switch (rol) {
                        case 'Mototaxi':
                            redirectPath = `mototaxi.html`; 
                            break;
                        case 'Motoparrillero':
                            redirectPath = `motoparrillero.html`;
                            break;
                        case 'Motocarga':
                            redirectPath = `motocarga.html`;
                            break;
                        case 'ConductorInter': // Asumiendo este rol para la vista conductorinter.html
                            redirectPath = `conductorinter.html`;
                            break;
                        case 'Despachador':
                            redirectPath = "despachadorinter.html";
                            break;
                        case 'CEO':
                            redirectPath = "ceo-panel.html";
                            break;
                        default:
                            console.warn(`Rol desconocido: ${rol}. Redirigiendo al panel general.`);
                            // Usa el fallback "panel-conductor.html"
                    }
                    
                    console.log(`Redirigiendo a ${rol} panel: ${redirectPath}`);
                    window.location.href = redirectPath;
                } else {
                    msg.textContent = "❌ Perfil de usuario no encontrado en Firestore. Contacte soporte.";
                    msg.classList.remove("hidden");
                }
            } catch (error) {
                console.error("Error al obtener el rol para la redirecciÃ³n:", error);
                msg.textContent = "❌ Error al validar el perfil de usuario.";
                msg.classList.remove("hidden");
            }
        }
        
        // Manejo de token inicial (si el usuario ya estÃ¡ logueado)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Si el usuario ya estÃ¡ autenticado (vÃ­a token o sesiÃ³n anterior), redirigir
                console.log("Usuario autenticado. Verificando rol...");
                redirectToPanel(user.uid);
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = form.email.value;
            const password = form.password.value;
            const submitBtn = form.querySelector('button[type="submit"]');

            submitBtn.textContent = 'Ingresando...';
            submitBtn.disabled = true;
            msg.classList.add("hidden");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log("Usuario logueado con Ã©xito:", userCredential.user.uid);
                await redirectToPanel(userCredential.user.uid);

            } catch (err) {
                console.error(err);
                let errorMessage = "Error al iniciar sesiÃ³n";
                // Manejo de errores de autenticaciÃ³n Firebase
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                    errorMessage = "ContraseÃ±a o correo incorrectos.";
                } else if (err.code === 'auth/user-not-found') {
                    errorMessage = "Usuario no registrado.";
                } else if (err.code === 'auth/invalid-email') {
                    errorMessage = "Formato de correo electrÃ³nico invÃ¡lido.";
                } else if (err.code === 'auth/too-many-requests') {
                    errorMessage = "Demasiados intentos. Intente mÃ¡s tarde.";
                }
                
                msg.textContent = `❌ ${errorMessage}`;
                msg.classList.remove("hidden");
                submitBtn.textContent = 'Ingresar';
                submitBtn.disabled = false;
            }
        });

    </script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
