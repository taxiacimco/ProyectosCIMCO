<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Conductores - TAXIA CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message { transition: all .3s ease; }
        .btn-primary { background-color: #34D399; } /* Verde claro para registro */
        .btn-primary:hover { background-color: #10B981; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Bienvenido</h1>
        <h2 class="text-xl text-center text-green-600 mb-6">TAXIA CIMCO - Registro de Conductor</h2>
        <form id="registerForm" class="space-y-4">
            <input type="text" id="nombre" placeholder="Nombre completo" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <input type="email" id="email" placeholder="Correo electrónico" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <select id="rol" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 text-gray-700">
                <option value="" disabled selected>Selecciona tu Rol</option>
                <option value="Mototaxi">Mototaxi</option>
                <option value="Motoparrillero">Motoparrillero</option>
                <option value="Motocarga">Motocarga</option>
                <option value="VehiculoIntermunicipal">Vehículo Intermunicipal</option>
                <option value="Despachador">Despachador</option>
            </select>
            <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <button type="submit"
                class="w-full btn-primary text-white font-semibold py-3 rounded-lg shadow-lg transition">
                <i class="fas fa-user-plus mr-2"></i> Registrar Cuenta
            </button>
        </form>
        <p id="msg" class="mt-4 text-center text-sm text-red-500 message hidden"></p>
        
        <p class="mt-6 text-center text-sm text-gray-500">
            ¿Ya tienes cuenta? <a href="login-conductor.html" class="text-green-600 hover:text-green-700 font-semibold">Inicia Sesión</a>
        </p>
    </div>

    <script type="module">

        // --- ConfiguraciÃ³n de Firebase ---
        setLogLevel('debug'); 
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        // No se usa initialAuthToken en el registro.
        
        // ColecciÃ³n PÃšBLICA para datos de usuarios (conductores, despachadores)
        const USUARIOS_COLLECTION = `artifacts/${appId}/public/data/usuarios`; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("registerForm");
        const msg = document.getElementById("msg");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = form.email.value;
            const password = form.password.value;
            const nombre = form.nombre.value;
            const rol = form.rol.value;
            const submitBtn = form.querySelector('button[type="submit"]');

            submitBtn.textContent = 'Registrando...';
            submitBtn.disabled = true;
            msg.classList.add("hidden");
            msg.classList.remove("text-green-600");
            msg.classList.add("text-red-500");

            try {
                // 1. Crear el usuario en Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 2. Guardar el perfil del usuario en Firestore
                await setDoc(doc(db, USUARIOS_COLLECTION, user.uid), {
                    uid: user.uid,
                    nombre: nombre,
                    email: email,
                    rol: rol, 
                    saldo: 0, // Saldo inicial en cero
                    activo: true, 
                    fechaRegistro: new Date()
                });

                console.log("Usuario registrado con Ã©xito y perfil guardado:", user.uid);
                
                msg.textContent = `âœ… Registro exitoso como ${rol}. Redirigiendo al Login...`;
                msg.classList.remove("hidden");
                msg.classList.remove("text-red-500");
                msg.classList.add("text-green-600");

                // Redirigir siempre al login para que el usuario inicie sesiÃ³n normalmente
                setTimeout(() => {
                     window.location.href = "login-conductor.html";
                }, 2000);


            } catch (err) {
                console.error(err);
                let errorMessage = "Error al registrarse.";
                if (err.code === 'auth/email-already-in-use') {
                    errorMessage = "El correo electrÃ³nico ya estÃ¡ en uso.";
                } else if (err.code === 'auth/weak-password') {
                     errorMessage = "La contraseÃ±a debe tener al menos 6 caracteres.";
                }
                
                msg.textContent = `âŒ ${errorMessage}`;
                msg.classList.remove("hidden");
                submitBtn.textContent = 'Registrar Cuenta';
                submitBtn.disabled = false;
            }
        });

    </script>

<script src="/js/firebase/firebase-loader.js"></script>
</body>
</html>
