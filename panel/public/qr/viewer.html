<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor de Códigos QR — TAXIA CIMCO</title>

<style>
  body {
    background: #080d1a;
    font-family: Inter, Segoe UI, sans-serif;
    color: #e8f4ff;
    margin: 0;
    padding: 0;
  }
  header {
    padding: 20px;
    text-align: center;
    background: #0d152b;
    color: #00d0ff;
    font-size: 1.4rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
  }
  #search {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #121c36;
    color: white;
    margin-bottom: 18px;
    font-size: 1rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }
  .card {
    background: #101a30;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 14px rgba(0,208,255,0.12);
  }
  .card img {
    width: 230px;
    background: white;
    border-radius: 6px;
    padding: 8px;
  }
  .btn {
    margin-top: 8px;
    background: #00d0ff;
    border: none;
    padding: 8px 14px;
    color: #000;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-outline {
    margin-top: 8px;
    background: transparent;
    border: 1px solid #00d0ff;
    color: #00d0ff;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
</style>
</head>
<body>

<header>📱 Visor de Códigos QR — TAXIA CIMCO</header>

<div class="container">

  <input id="search" type="text" placeholder="Buscar por rol: mototaxi, pasajero, despachador..." />

  <div id="qrGrid" class="grid"></div>

</div>

<script>
// Lista de roles usados en generate-role-qr.mjs
const roles = [
  "pasajero",
  "mototaxi",
  "motoparrillero",
  "motocarga",
  "despachador",
  "interconductor"
];

function renderGrid(filter="") {
  const grid = document.getElementById("qrGrid");
  grid.innerHTML = "";

  roles
    .filter(r => r.toLowerCase().includes(filter.toLowerCase()))
    .forEach(role => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${role.toUpperCase()}</h3>
        <img src="./${role}.png" alt="QR ${role}">
        <div style="margin-top:12px;">
          <button class="btn" onclick="downloadQR('${role}')">📥 Descargar</button>
          <button class="btn-outline" onclick="printQR('${role}')">🖨️ Imprimir</button>
        </div>
      `;

      grid.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", e => {
  renderGrid(e.target.value);
});

function downloadQR(role) {
  const link = document.createElement("a");
  link.href = `./${role}.png`;
  link.download = `${role}.png`;
  link.click();
}

function printQR(role) {
  const w = window.open("", "_blank");
  w.document.write(`
    <img src="./${role}.png" style="width:300px; display:block; margin:auto; padding:20px">
    <h2 style="text-align:center; font-family:Arial">${role.toUpperCase()}</h2>
  `);
  w.document.close();
  w.print();
}

renderGrid();
</script>

</body>
</html>


<script type="module" src="/js/firebase/firebase-loader.js"></script>
