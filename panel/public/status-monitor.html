<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔍 Monitor de Estado - TAXIA CIMCO</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
  <h1 class="text-3xl font-bold mb-6 text-center">🚦 Monitor de Estado - TAXIA CIMCO</h1>

  <section id="estado-actual" class="bg-gray-800 rounded-2xl p-5 mb-8 shadow-lg">
    <h2 class="text-2xl font-semibold mb-3">Estado Actual</h2>
    <pre id="status" class="bg-gray-950 p-3 rounded-lg text-sm overflow-auto"></pre>
  </section>

  <section id="historial" class="bg-gray-800 rounded-2xl p-5 shadow-lg">
    <h2 class="text-2xl font-semibold mb-3">Historial de Sincronizaciones</h2>
    <pre id="log" class="bg-gray-950 p-3 rounded-lg text-sm overflow-auto h-96"></pre>
  </section>

  <footer class="mt-6 text-center text-gray-500 text-sm">
    TAXIA CIMCO Monitor • Actualiza automáticamente cada 60 segundos ⏱️
  </footer>

  <script>
    async function cargarStatus() {
      try {
        const res = await fetch('./status.json?_=' + Date.now());
        const data = await res.json();
        document.getElementById('status').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('status').textContent = '❌ Error al cargar status.json: ' + err.message;
      }
    }

    async function cargarLog() {
      try {
        const res = await fetch('../logs/auto-update-status.log?_=' + Date.now());
        const text = await res.text();
        document.getElementById('log').textContent = text;
      } catch (err) {
        document.getElementById('log').textContent = '⚠️ No se pudo leer el archivo de log (verifica permisos).';
      }
    }

    function actualizarTodo() {
      cargarStatus();
      cargarLog();
    }

    actualizarTodo();
    setInterval(actualizarTodo, 60000); // cada 60 segundos
  </script>
</body>
</html>


<script type="module" src="/js/firebase/firebase-loader.js"></script>
