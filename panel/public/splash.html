<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iniciando Panel CIMCO...</title>
<meta name="theme-color" content="#00b4ff">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/assets/favicon-cimco.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root {
    --cian:#00b4ff;
    --azul:#0077cc;
    --negro:#0a0f16;
    --gris:#1a2233;
    --blanco:#e5f2ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:radial-gradient(circle at 50% 35%, var(--gris) 0%, var(--negro) 100%);
    color:var(--blanco);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    height:100vh;
    font-family:"Inter", system-ui, sans-serif;
    overflow:hidden;
  }

  .orbital {
    position:relative;
    width:180px;
    height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    box-shadow:0 0 25px rgba(0,180,255,0.3);
    animation:pulse 2.5s infinite ease-in-out;
  }

  .orbital::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--cian), transparent, var(--azul), transparent, var(--cian));
    animation:spin 3.8s linear infinite;
    filter:blur(8px);
    opacity:0.8;
  }

  .orbital img {
    width:95px;
    height:95px;
    z-index:2;
    filter:drop-shadow(0 0 10px var(--cian));
  }

  h1 {
    margin-top:28px;
    font-size:22px;
    font-weight:700;
    text-shadow:0 0 16px rgba(0,180,255,0.4);
    letter-spacing:1px;
  }

  .progress {
    margin-top:28px;
    width:120px;
    height:6px;
    border-radius:4px;
    background:rgba(255,255,255,0.15);
    overflow:hidden;
    position:relative;
  }

  .progress::before {
    content:"";
    position:absolute;
    width:40%;
    height:100%;
    background:linear-gradient(90deg, transparent, var(--cian), var(--azul), transparent);
    animation:slide 1.4s infinite linear;
  }

  footer {
    position:absolute;
    bottom:18px;
    font-size:13px;
    opacity:0.8;
    letter-spacing:0.5px;
  }

  @keyframes pulse {
    0%,100% { transform:scale(1); box-shadow:0 0 20px rgba(0,180,255,0.3); }
    50% { transform:scale(1.05); box-shadow:0 0 40px rgba(0,180,255,0.6); }
  }

  @keyframes slide {
    from { left:-40%; }
    to { left:100%; }
  }

  @keyframes spin {
    to { transform:rotate(360deg); }
  }

  .fade-out {
    opacity:0;
    transform:scale(0.96);
    transition:opacity 0.8s ease, transform 0.8s ease;
  }
</style>
</head>
<body>
  <div class="orbital">
    <img src="/assets/logo-taxiacimco.png" alt="TAXIA CIMCO Panel">
  </div>
  <h1>Iniciando Panel CIMCO...</h1>
  <div class="progress"></div>
  <footer>Centro de mantenimiento • TAXIA CIMCO ⚙️</footer>

<script>
  // ⏳ Espera 2.8 segundos y redirige al panel principal
  setTimeout(() => {
    document.body.classList.add('fade-out');
    setTimeout(() => {
      window.location.href = "/panel-mantenimiento.html";
    }, 800);
  }, 2800);
</script>
</body>
</html>


<script type="module" src="/js/firebase/firebase-loader.js"></script>
