<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel de Mantenimiento - TAXIA CIMCO</title>

  <!-- 🔗 Integración PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4ff">
<link rel="apple-touch-icon" href="/assets/favicon-cimco.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- 🎨 Estilos -->
  <style>
    :root {
      --bg:#0f1724; --card:#0b1220; --accent:#00b4ff; --accent2:#ffcc00; --text:#e6f0ff;
    }
    body {
      margin:0;
      font-family:Inter,Segoe UI,Arial;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh
    }
    .card {
      width:880px;
      border-radius:14px;
      padding:36px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow:0 8px 30px rgba(0,0,0,0.6);
      text-align:center
    }
    .logo{height:72px;margin-bottom:6px}
    h1{margin:6px 0 20px;color:var(--accent2);text-shadow:0 4px 18px rgba(0,0,0,0.6);font-size:28px}
    .btns{display:flex;gap:12px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
    button{border:none;padding:12px 18px;border-radius:10px;color:#fff;cursor:pointer;font-weight:600;box-shadow:0 6px 20px rgba(3,180,255,0.12);transition:transform .14s ease,box-shadow .14s}
    button:hover{transform:translateY(-3px)}
    button.run{background:linear-gradient(90deg,#00b4ff,#3bd1ff)}
    button.clean{background:linear-gradient(90deg,#2b8cff,#1b6cff)}
    button.probe{background:linear-gradient(90deg,#14b8a6,#0d9488)}
    button.toggle{background:linear-gradient(90deg,#ff7b00,#ff3b3b);position:relative;display:flex;align-items:center;gap:8px;justify-content:center}
    button.toggle .status-dot{width:12px;height:12px;border-radius:50%;background:#aaa;box-shadow:0 0 6px #000}
    pre.console{height:200px;overflow:auto;background:#071018;border-radius:8px;padding:12px;color:#cfefff;text-align:left;white-space:pre-wrap}
    .notif{position:fixed;right:20px;bottom:20px;z-index:999}
    .toast{background:#071018;border-left:6px solid #00e0ff;color:#e8f8ff;padding:12px 16px;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,0.6);margin-top:10px;min-width:240px}
    .toast.fail{border-left-color:#ff5a5a;background:#221212;color:#ffdcdc}
    .small{font-size:13px;opacity:.9}

    /* 🌟 Efecto neón parpadeante rojo */
    @keyframes neonPulse {
      0%,100% { box-shadow:0 0 6px #ef4444,0 0 12px #ef4444,0 0 24px #ef4444; opacity:1; }
      50% { box-shadow:0 0 2px #ef4444,0 0 6px #ef4444; opacity:0.6; }
    }
    .blink-red { animation: neonPulse 1.2s infinite ease-in-out; }
  </style>
</head>

<body>
  <div class="card">
    <img src="/assets/logo-taxiacimco.png" class="logo" alt="TAXIA CIMCO" onerror="this.style.display='none'"/>
    <h1>Panel de Mantenimiento - TAXIA CIMCO</h1>

    <div class="btns">
      <button id="btn-run" class="run">🚀 Ejecutar Mantenimiento</button>
      <button id="btn-clean" class="clean">🧹 Limpiar Logs</button>
      <button id="btn-probe" class="probe">🧪 Probar Sistema</button>
      <button id="btn-toggle" class="toggle">
        🔁 Alternar Estado Firestore
        <span id="dot-status" class="status-dot"></span>
      </button>
    </div>

    <pre id="console" class="console small">Consola de ejecución — espera acciones...</pre>
  </div>

  <div id="notifs" class="notif"></div>

  <script>
    const consoleEl = document.getElementById("console");
    const notifs = document.getElementById("notifs");
    const dotStatus = document.getElementById("dot-status");

    // 🎵 Sonido corto
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(type="success"){
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = (type==="success") ? 880 : 220;
      g.gain.value = 0.0001;
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start();
      const now = audioCtx.currentTime;
      g.gain.linearRampToValueAtTime(0.08, now + 0.02);
      g.gain.linearRampToValueAtTime(0.0001, now + 0.28);
      osc.stop(now + 0.3);
    }

    // 🔔 Notificaciones flotantes
    function toast(text, type="info"){
      const t = document.createElement("div");
      t.className = "toast " + (type==="fail"?"fail":"");
      t.innerHTML = `<div style="font-weight:700">${text}</div>`;
      notifs.appendChild(t);
      setTimeout(()=> t.style.opacity=1, 50);
      setTimeout(()=>{ t.style.transition="opacity .6s"; t.style.opacity=0; setTimeout(()=>t.remove(),700) }, 6000);
    }

    // 🔄 Conexión SSE
    const evt = new EventSource("/events");
    evt.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === "stdout" || d.type === "stderr") {
          consoleEl.textContent += d.msg;
        } else if (d.type === "success") {
          consoleEl.textContent += `\n${d.msg}\n`;
          toast(d.msg); beep("success");
          actualizarIndicadorEstado();
        } else if (d.type === "fail" || d.type === "error") {
          consoleEl.textContent += `\n${d.msg}\n`;
          toast(d.msg, "fail"); beep("error");
        } else if (d.type === "meta") {
          consoleEl.textContent += `[${new Date().toLocaleTimeString()}] ${d.msg}\n`;
        }
        consoleEl.scrollTop = consoleEl.scrollHeight;
      } catch (err) { consoleEl.textContent += `\n[PARSE ERROR] ${e.data}\n`; }
    };

    // 🚀 POST simple
    async function post(path, label){
      consoleEl.textContent += `\n[${new Date().toLocaleTimeString()}] Iniciando: ${label}...\n`;
      const res = await fetch(path, { method: "POST" }).catch(e => ({ ok:false, json: async ()=>({ success:false, msg:e.message })}));
      const j = await (res.ok ? res.json() : res.json());
      consoleEl.textContent += `[${new Date().toLocaleTimeString()}] Resultado: ${j.msg || JSON.stringify(j)}\n`;
      if (j.success) { toast("✅ " + label + " completado"); beep("success"); }
      else { toast("❌ Error: " + (j.msg||"falló"), "fail"); beep("error"); }
    }

    // Botones
    document.getElementById("btn-run").onclick = ()=> post("/run-maintenance","Mantenimiento Semanal");
    document.getElementById("btn-clean").onclick = ()=> post("/clean-logs","Limpieza de Logs");
    document.getElementById("btn-probe").onclick = ()=> post("/probe","Prueba Firestore");
    document.getElementById("btn-toggle").onclick = ()=> post("/toggle-status","Alternar Estado Firestore");

    // 🟢 Estado dinámico
    async function actualizarIndicadorEstado() {
      try {
        const r = await fetch("/logs/status.json?" + Date.now());
        const j = await r.json();
        dotStatus.classList.remove("blink-red");
        if (j.status === "OK") {
          dotStatus.style.background = "#22c55e";
          dotStatus.style.boxShadow = "0 0 8px #22c55e";
        } else if (j.status === "ERROR") {
          dotStatus.style.background = "#ef4444";
          dotStatus.style.boxShadow = "0 0 8px #ef4444";
          dotStatus.classList.add("blink-red");
        } else {
          dotStatus.style.background = "#facc15";
          dotStatus.style.boxShadow = "0 0 8px #facc15";
        }
      } catch {
        dotStatus.style.background = "#999";
      }
    }

    setInterval(actualizarIndicadorEstado, 10000);
    actualizarIndicadorEstado();
  </script>

  <!-- 🔚 Registro del Service Worker -->
  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('✅ ServiceWorker del panel registrado en', reg.scope))
      .catch(err => console.warn('❌ Error registrando ServiceWorker:', err));
  });
}
</script>
</body>
</html>


<script type="module" src="/js/firebase/firebase-loader.js"></script>
