name: CIMCO Platform - Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. AUTENTICACIÓN
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 2. DESPLIEGUE DE FRONTEND (React + Firebase Hosting)
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy Firebase (Hosting & Rules)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live

      # 3. DESPLIEGUE DE BACKEND JAVA (Cloud Run)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd taxia_cimco_backend
          mvn -B package -DskipTests

      - name: Build and Push Docker Image
        run: |
          gcloud auth configure-docker --quiet
          # Usamos el Dockerfile que debería estar en la raíz del backend
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/cimco-backend:${{ github.sha }} ./taxia_cimco_backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/cimco-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy cimco-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/cimco-backend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated